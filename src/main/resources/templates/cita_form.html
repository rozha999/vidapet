
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cita Form</title>
    <link rel="stylesheet" th:href="@{/css/fcita.css}">
</head>
<body>

<h1 th:text="${cita != null} ? '✏️ Editar Cita' : '➕ Nueva Cita'"></h1>

<form th:action="@{${cita != null} ? '/citas/actualizar' : '/citas/guardar'}" method="post">

    <!-- ID (solo para editar) -->
    <input type="hidden" name="id" th:value="${cita?.id}">

    <form action="/citas/guardar" method="post">

        <!-- MASCOTA -->
        <div class="mb-3">
            <label>Mascota</label>
            <select id="mascotaSelect" name="mascota_id" class="form-control" required>
                <option value="">Selecciona mascota</option>
                <option th:each="m : ${mascotas}"
                        th:value="${m.id}"
                        th:text="${m.nombre}">
                </option>
            </select>
        </div>

        <!-- PROPIETARIO (AUTO) -->
        <div class="mb-3">
            <label>Propietario</label>
            <input type="hidden" id="propietario_id" name="propietario_id">
            <input type="text" id="propietario_nombre" class="form-control" readonly>
        </div>

        <!-- VETERINARIO -->
        <div class="mb-3">
            <label>Veterinario</label>
            <select name="veterinario_id" class="form-control">
                <option value="">Selecciona veterinario</option>

                <option th:each="v : ${veterinarios}"
                        th:value="${v.id}"
                        th:text="${v.nombre + ' ' + v.apellido}">
                </option>
            </select>
        </div>

        <!-- FECHA -->
        <div class="mb-3">
            <label>Fecha</label>
            <input type="datetime-local" name="fecha" class="form-control" required>
        </div>

        <!-- NOTA -->
        <div class="mb-3">
            <label>Nota</label>
            <textarea name="nota" class="form-control"></textarea>
        </div>

        <button class="btn btn-primary">Guardar Cita</button>
    </form>
    <script>
        document.getElementById("mascotaSelect").addEventListener("change", function () {

            const mascotaId = this.value;

            if (!mascotaId) return;

            fetch("/mascotas/" + mascotaId + "/propietario")
                .then(res => res.json())
                .then(data => {

                    document.getElementById("propietario_id").value = data.id;
                    document.getElementById("propietario_nombre").value =
                        data.nombre + " " + data.apellido;
                });
        });
    </script>
<br>
<a href="/citas">⬅ Volver</a>

</body>
</html>
