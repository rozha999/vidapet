<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${cita.id == '' ? 'Nueva cita' : 'Editar cita'}"></title>
</head>
<body>
<h2 th:text="${cita.id == '' ? 'Nueva cita' : 'Editar cita'}"></h2>

<form th:action="@{${cita.id == '' ? '/citas/guardar' : '/citas/actualizar'}}" method="post">
    <input type="hidden" name="id" th:value="${cita.id}"/>

    <label>Seleccionar mascota:</label>
    <select name="mascota_id" required>
        <option value="" disabled selected>Seleccione una mascota</option>
        <option th:each="m : ${mascotas}"
                th:value="${m.id}"
                th:text="|${m.nombre} (${m.propietario_nombre})|"
                th:selected="${m.id == cita.mascota_id}"></option>
    </select>
    <br/><br/>

    <label>Fecha:</label>
    <input type="date" name="fecha" th:value="${cita.fecha}" required/>
    <br/><br/>

    <label>Hora:</label>
    <input type="time" name="hora" th:value="${cita.hora}" required/>
    <br/><br/>

    <label>Notas:</label>
    <textarea name="notas" th:text="${cita.notas}"></textarea>
    <br/><br/>

    <button type="submit">Guardar</button>
    <a href="/citas">Volver</a>
</form>
</body>
</html>
