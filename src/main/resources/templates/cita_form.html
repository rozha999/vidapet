
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cita Form</title>
</head>
<body>

<h1 th:text="${cita != null} ? '✏️ Editar Cita' : '➕ Nueva Cita'"></h1>

<form th:action="@{${cita != null} ? '/citas/actualizar' : '/citas/guardar'}" method="post">

    <!-- ID (solo para editar) -->
    <input type="hidden" name="id" th:value="${cita?.id}">

    <!-- Mascota -->
    <label>Mascota:</label>
    <select name="mascota_id" required>
        <option value="">-- Seleccionar --</option>
        <option th:each="m : ${mascotas}"
                th:value="${m.id}"
                th:text="${m.nombre}"
                th:selected="${cita != null and m.id == cita.mascota_id}">
        </option>
    </select>

    <br><br>

    <!-- Propietario -->
    <label>Propietario:</label>
    <select name="propietario_id" required>
        <option value="">-- Seleccionar --</option>
        <option th:each="p : ${propietarios}"
                th:value="${p.id}"
                th:text="${p.nombre + ' ' + p.apellido}"
                th:selected="${cita != null and p.id == cita.propietario_id}">
        </option>
    </select>

    <br><br>

    <!-- Fecha -->
    <label>Fecha:</label>
    <input type="datetime-local" name="fecha"
           th:value="${cita != null} ? ${#temporals.format(cita.fecha, 'yyyy-MM-dd''T''HH:mm')} : ''"
           required>

    <br><br>

    <!-- Nota -->
    <label>Nota:</label>
    <textarea name="nota" th:text="${cita?.nota}"></textarea>

    <br><br>

    <button type="submit">💾 Guardar</button>

</form>

<br>
<a href="/citas">⬅ Volver</a>

</body>
</html>
