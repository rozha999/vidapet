<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <title>Lista de Especies - VidaPet</title>
  <link rel="stylesheet" th:href="@{/css/especie.css}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="layout">

  <aside class="sidebar">
    <header>
      <h1>| VidaPET</h1>
    </header>

    <nav aria-label="Menú principal">
      <a th:href="@{/}"><i class="fas fa-home"></i> Home</a>
      <a th:href="@{/propietarios}"><i class="fas fa-user"></i> Propietarios</a>
      <a th:href="@{/mascotas}"><i class="fas fa-dog"></i> Mascotas</a>
      <a th:href="@{/veterinarios}"><i class="fas fa-user-md"></i> Veterinarios</a>
      <a th:href="@{/especies}"><i class="fas fa-paw"></i> Especies</a>
      <a th:href="@{/citas}"><i class="fas fa-calendar"></i> Citas</a>
      <a th:href="@{/consultas}"><i class="fas fa-stethoscope"></i> Consultas</a>
    </nav>

    <img th:src="@{/images/www.png}" class="logo" alt="Logotipo de VidaPet">
  </aside>

  <main class="main">

    <header class="content-header">
      <h1>Lista de Especies</h1>

      <div class="top-bar">
        <a th:href="@{/especies/nuevo}" class="btn">
          <i class="fas fa-plus"></i> Agregar Nueva Especie
        </a>
      </div>
    </header>

    <section class="table-container">
      <table>
        <thead>
        <tr>
          <th scope="col">Imagen</th>
          <th scope="col">Nombre de la Especie</th>
          <th scope="col">Acciones</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="especie : ${especies}">

          <td class="img-cell">
            <figure class="m-0">
              <img th:if="${especie['foto'] != null and especie['foto'] != ''}"
                   th:src="@{'/' + ${especie['foto']}}"
                   class="avatar"
                   th:alt="'Foto de ' + ${especie['nombre']}">

              <i th:unless="${especie['foto'] != null and especie['foto'] != ''}"
                 class="fas fa-paw default-icon"
                 aria-hidden="true"></i>
            </figure>
          </td>

          <td class="fw-bold" th:text="${especie['nombre']}"></td>

          <td class="actions">
            <nav aria-label="Acciones de fila">
              <a th:href="@{'/especies/editar/' + ${especie['id']}}"
                 class="icon-btn edit"
                 title="Editar especie">
                <i class="fas fa-pen"></i>
              </a>

              <a th:href="@{'/especies/eliminar/' + ${especie['id']}}"
                 onclick="return confirm('¿Está seguro de eliminar esta especie?');"
                 class="icon-btn delete"
                 title="Eliminar especie">
                <i class="fas fa-trash"></i>
              </a>
            </nav>
          </td>
        </tr>

        <tr th:if="${#lists.isEmpty(especies)}">
          <td colspan="3" class="empty-state">
            <i class="fas fa-info-circle"></i>
            <p>No hay especies registradas actualmente</p>
          </td>
        </tr>
        </tbody>
      </table>
    </section>

  </main>
</div>

</body>
</html>
