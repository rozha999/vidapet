<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="/css/especie.css">
  <title>Lista de Especies</title>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="layout">

  <!-- ===== Sidebar ===== -->
  <div class="sidebar">
    <h1>| VidaPET</h1>

    <a href="/"><i class="fas fa-home"></i> Home</a>
    <a href="/propietarios"><i class="fas fa-user"></i> Propietarios</a>
    <a href="/mascotas"><i class="fas fa-dog"></i> Mascotas</a>
    <a href="/veterinarios"><i class="fas fa-user-md"></i> Veterinarios</a>

    <a href="/especies"><i class="fas fa-paw"></i> Especies</a>

    <a href="/citas"><i class="fas fa-calendar"></i> Citas</a>
    <a href="/consultas"><i class="fas fa-stethoscope"></i> Consultas</a>

    <img src="/images/www.png" class="logo" alt="VidaPet">
  </div>

  <!-- ===== Main ===== -->
  <div class="main">

    <h1>Lista de Especies</h1>

    <div class="top-bar">
      <a th:href="@{/especies/nuevo}" class="btn">
        <i class="fas fa-plus"></i> Agregar
      </a>
    </div>

    <!-- ===== Table ===== -->
    <table>
      <thead>
      <tr>
        <th>Imagen</th>
        <th>Nombre</th>
        <th>Acciones</th>
      </tr>
      </thead>

      <tbody>
      <tr th:each="especie : ${especies}">

        <!-- تصویر -->
        <td class="img-cell">
          <img th:if="${especie['foto'] != null and especie['foto'] != ''}"
               th:src="@{'/' + ${especie['foto']}}"
               class="avatar">

          <i th:unless="${especie['foto'] != null and especie['foto'] != ''}"
             class="fas fa-paw default-icon"></i>
        </td>

        <td th:text="${especie['nombre']}"></td>

        <!-- دکمه‌ها مثل بقیه -->
        <td class="actions">
          <a th:href="@{'/especies/editar/' + ${especie['id']}}"
             class="icon-btn edit">
            <i class="fas fa-pen"></i>
          </a>

          <a th:href="@{'/especies/eliminar/' + ${especie['id']}}"
             onclick="return confirm('¿Eliminar especie?');"
             class="icon-btn delete">
            <i class="fas fa-trash"></i>
          </a>
        </td>

      </tr>

      <!-- حالت خالی -->
      <tr th:if="${#lists.isEmpty(especies)}">
        <td colspan="3" style="text-align:center; padding:20px; color:#94a3b8;">
          No hay especies registradas
        </td>
      </tr>

      </tbody>
    </table>

  </div>
</div>

</body>
</html>
