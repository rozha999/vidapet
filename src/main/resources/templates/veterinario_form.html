<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" th:href="@{/css/fveterinario.css}">
  <link rel="stylesheet" th:href="@{/css/fpropietario.css}">
  <title th:text="${#strings.isEmpty(veterinario['id']) ? 'Nuevo Veterinario - VidaPet' : 'Editar Veterinario - VidaPet'}">VidaPET</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="layout">

  <aside class="sidebar">
    <header>
      <h1>| VidaPET</h1>
    </header>

    <nav aria-label="Navegación principal">
      <a th:href="@{/}"><i class="fas fa-home" aria-hidden="true"></i> <span>Home</span></a>
      <a th:href="@{/propietarios}"><i class="fas fa-user" aria-hidden="true"></i> <span>Propietarios</span></a>
      <a th:href="@{/mascotas}"><i class="fas fa-dog" aria-hidden="true"></i> <span>Mascotas</span></a>
      <a th:href="@{/veterinarios}" class="active"><i class="fas fa-user-md" aria-hidden="true"></i> <span>Veterinarios</span></a>
      <a th:href="@{/especies}"><i class="fas fa-paw" aria-hidden="true"></i> <span>Especies</span></a>
      <a th:href="@{/citas}"><i class="fas fa-calendar" aria-hidden="true"></i> <span>Citas</span></a>
      <a th:href="@{/consultas}"><i class="fas fa-stethoscope" aria-hidden="true"></i> <span>Consultas</span></a>
    </nav>

    <figure class="logo-container">
      <img th:src="@{/images/www.png}" class="logo" alt="Logotipo oficial VidaPet">
    </figure>
  </aside>

  <main class="main">

    <header>
      <h1 th:text="${#strings.isEmpty(veterinario['id']) ? 'Nuevo Veterinario' : 'Editar Veterinario'}">Formulario</h1>
    </header>

    <section class="card-form" aria-labelledby="form-title">
      <form th:action="${#strings.isEmpty(veterinario['id']) ? '/veterinarios/guardar' : '/veterinarios/actualizar'}"
            method="post">

        <input type="hidden" name="id" th:value="${veterinario['id']}">

        <div class="form-group">
          <label for="nombre"><i class="fas fa-user" aria-hidden="true"></i> Nombre:</label>
          <input type="text" id="nombre" name="nombre" th:value="${veterinario['nombre']}" required placeholder="Ej: Carlos">
        </div>

        <div class="form-group">
          <label for="apellido"><i class="fas fa-user-tag" aria-hidden="true"></i> Apellido:</label>
          <input type="text" id="apellido" name="apellido" th:value="${veterinario['apellido']}" required placeholder="Ej: Ruiz">
        </div>

        <div class="form-group">
          <label for="telefono"><i class="fas fa-phone" aria-hidden="true"></i> Teléfono:</label>
          <input type="tel" id="telefono" name="telefono" th:value="${veterinario['telefono']}" placeholder="Ej: 600123456">
        </div>

        <div class="form-group">
          <label for="email"><i class="fas fa-envelope" aria-hidden="true"></i> Email:</label>
          <input type="email" id="email" name="email" th:value="${veterinario['email']}" placeholder="doctor@vidapet.com">
        </div>

        <div class="form-group">
          <label for="especialidad"><i class="fas fa-graduation-cap" aria-hidden="true"></i> Especialidad:</label>
          <input type="text" id="especialidad" name="especialidad" th:value="${veterinario['especialidad']}" placeholder="Ej: Cirugía, Dermatología...">
        </div>

        <div class="form-group">
          <label for="codigo_colegiado"><i class="fas fa-id-badge" aria-hidden="true"></i> Código Colegiado:</label>
          <input type="text" id="codigo_colegiado" name="codigo_colegiado" th:value="${veterinario['codigo_colegiado']}" placeholder="Ej: COL-12345">
        </div>

        <footer class="form-actions">
          <button type="submit" class="btn">
            <i class="fas fa-save" aria-hidden="true"></i>
            <span th:text="${#strings.isEmpty(veterinario['id']) ? ' Guardar' : ' Actualizar'}"></span>
          </button>
          <a class="btn-secondary" th:href="@{/veterinarios}">
            <i class="fas fa-arrow-left" aria-hidden="true"></i> Volver a la lista
          </a>
        </footer>

      </form>
    </section>
  </main>
</div>

</body>
</html>
