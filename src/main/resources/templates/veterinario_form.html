<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" th:href="@{/css/fveterinario.css}">
  <title th:text="${#strings.isEmpty(veterinario['id']) ? 'Nuevo Veterinario' : 'Editar Veterinario'}"></title>
</head>
<body>

<div class="page">

  <div class="card">

    <!-- عنوان -->
    <h2 th:text="${#strings.isEmpty(veterinario['id']) ? 'Nuevo Veterinario' : 'Editar Veterinario'}"></h2>

    <!-- فرم -->
    <form th:action="${#strings.isEmpty(veterinario['id']) ? '/veterinarios/guardar' : '/veterinarios/actualizar'}"
          method="post">

      <input type="hidden" name="id" th:value="${veterinario['id']}">

      <!-- Nombre -->
      <label>Nombre:</label>
      <input type="text" name="nombre" th:value="${veterinario['nombre']}" required>

      <!-- Apellido -->
      <label>Apellido:</label>
      <input type="text" name="apellido" th:value="${veterinario['apellido']}" required>

      <!-- Teléfono -->
      <label>Teléfono:</label>
      <input type="text" name="telefono" th:value="${veterinario['telefono']}">

      <!-- Email -->
      <label>Email:</label>
      <input type="email" name="email" th:value="${veterinario['email']}">

      <!-- Especialidad -->
      <label>Especialidad:</label>
      <input type="text" name="especialidad" th:value="${veterinario['especialidad']}">

      <!-- Código colegiado -->
      <label>Código Colegiado:</label>
      <input type="text" name="codigo_colegiado" th:value="${veterinario['codigo_colegiado']}">

      <!-- Button -->
      <button type="submit"
              th:text="${#strings.isEmpty(veterinario['id']) ? 'Guardar' : 'Actualizar'}">
      </button>

    </form>

    <!-- back -->
    <a class="back" href="/veterinarios">← Volver a la lista</a>

  </div>

</div>

</body>
</html>
