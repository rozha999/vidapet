<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Cita - VidaPet</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>
<body class="p-4">
<h1 th:text="${cita.id} != '' ? 'Editar Cita' : 'Nueva Cita'"></h1>

<form th:action="${cita.id} != '' ? @{/citas/actualizar} : @{/citas/guardar}" method="post">
    <input type="hidden" th:if="${cita.id != ''}" name="id" th:value="${cita.id}">

    <div class="mb-3">
        <label>Mascota</label>
        <select class="form-control" name="mascota_id" required>
            <option value="">Seleccione una mascota</option>
            <option th:each="m : ${mascotas}"
                    th:value="${m.id}"
                    th:text="${m.nombre} + ' (' + m.propietario_nombre + ')'"
                    th:selected="${cita.mascota_id} == ${m.id}"></option>
        </select>
    </div>

    <div class="mb-3">
        <label>Fecha</label>
        <input type="date" class="form-control" name="fecha" th:value="${cita.fecha}" required>
    </div>

    <div class="mb-3">
        <label>Hora</label>
        <input type="time" class="form-control" name="hora" th:value="${cita.hora}" required>
    </div>

    <div class="mb-3">
        <label>Notas</label>
        <textarea class="form-control" name="notas" th:text="${cita.notas}"></textarea>
    </div>

    <button type="submit" class="btn btn-primary">Guardar</button>
    <a th:href="@{/citas}" class="btn btn-secondary">Cancelar</a>
</form>
</body>
</html>
