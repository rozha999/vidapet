<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Veterinarios - VidaPET</title>

    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link rel="stylesheet" th:href="@{/css/veterinario.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="layout">

    <aside class="sidebar">
        <header>
            <h1>| VidaPET</h1>
        </header>

        <nav aria-label="Navegación principal">
            <a th:href="@{/}"><i class="fas fa-home" aria-hidden="true"></i> <span>Home</span></a>
            <a th:href="@{/propietarios}"><i class="fas fa-user" aria-hidden="true"></i> <span>Propietarios</span></a>
            <a th:href="@{/mascotas}"><i class="fas fa-dog" aria-hidden="true"></i> <span>Mascotas</span></a>
            <a th:href="@{/veterinarios}" class="active"><i class="fas fa-user-md" aria-hidden="true"></i> <span>Veterinarios</span></a>
            <a th:href="@{/especies}"><i class="fas fa-paw" aria-hidden="true"></i> <span>Especies</span></a>
            <a th:href="@{/citas}"><i class="fas fa-calendar" aria-hidden="true"></i> <span>Citas</span></a>
            <a th:href="@{/consultas}"><i class="fas fa-stethoscope" aria-hidden="true"></i> <span>Consultas</span></a>
        </nav>

        <figure class="logo-container">
            <img th:src="@{/images/www.png}" class="logo" alt="Logotipo VidaPet">
        </figure>
    </aside>

    <main class="main">

        <header>
            <h1>Lista de Veterinarios</h1>
        </header>

        <section class="top-bar">
            <a th:href="@{/veterinarios/nuevo}" class="btn">
                <i class="fas fa-plus" aria-hidden="true"></i> Agregar Veterinario
            </a>

            <div class="search-container">
                <form method="get" th:action="@{/veterinarios}" role="search">
                    <input type="text" name="search"
                           placeholder="Nombre, apellido o especialidad..."
                           aria-label="Buscar veterinario">
                    <button type="submit">
                        <i class="fas fa-search" aria-hidden="true"></i>
                    </button>
                </form>
            </div>
        </section>

        <section class="table-container">
            <table>
                <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Apellido</th>
                    <th>Teléfono</th>
                    <th>Email</th>
                    <th>Especialidad</th>
                    <th>Código</th>
                    <th>Acciones</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="veterinario : ${veterinarios}">

                    <td data-label="Nombre">
                        <strong th:text="${veterinario['nombre']}"></strong>
                    </td>

                    <td data-label="Apellido" th:text="${veterinario['apellido']}"></td>

                    <td data-label="Teléfono" th:text="${veterinario['telefono']}"></td>

                    <td data-label="Email" th:text="${veterinario['email']}"></td>

                    <td data-label="Especialidad">
                        <span class="badge-specialty" th:text="${veterinario['especialidad']}"></span>
                    </td>

                    <td data-label="Código">
                        <code th:text="${veterinario['codigo_colegiado']}"></code>
                    </td>

                    <td data-label="Acciones">
                        <div class="actions">
                            <a th:href="@{'/veterinarios/editar/' + ${veterinario['id']}}"
                               class="icon-btn edit">
                                <i class="fas fa-pen"></i>
                            </a>

                            <a th:href="@{'/veterinarios/eliminar/' + ${veterinario['id']}}"
                               onclick="return confirm('¿Eliminar?');"
                               class="icon-btn delete">
                                <i class="fas fa-trash"></i>
                            </a>
                        </div>
                    </td>

                </tr>

                <tr th:if="${#lists.isEmpty(veterinarios)}">
                    <td colspan="7" class="empty-state">
                        <i class="fas fa-user-slash fa-2x"></i>
                        <p>No hay veterinarios registrados</p>
                    </td>
                </tr>
                </tbody>
            </table>
        </section>

    </main>
</div>

</body>
</html>
