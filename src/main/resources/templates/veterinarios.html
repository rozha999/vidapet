<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/css/veterinario.css">
    <title>Lista de Veterinarios</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="layout">

    <!-- ===== Sidebar ===== -->
    <div class="sidebar">
        <h1>| VidaPET</h1>

        <a href="/"><i class="fas fa-home"></i> Home</a>
        <a href="/propietarios"><i class="fas fa-user"></i> Propietarios</a>
        <a href="/mascotas"><i class="fas fa-dog"></i> Mascotas</a>
        <a href="/veterinarios"><i class="fas fa-user-md"></i> Veterinarios</a>
        <a href="/especies"><i class="fas fa-paw"></i> Especies</a>
        <a href="/citas"><i class="fas fa-calendar"></i> Citas</a>
        <a href="/consultas"><i class="fas fa-stethoscope"></i> Consultas</a>

        <img src="/images/www.png" class="logo" alt="VidaPet">
    </div>

    <!-- ===== Main ===== -->
    <div class="main">

        <h1>Lista de Veterinarios</h1>

        <!-- top bar مثل بقیه -->
        <div class="top-bar">
            <a th:href="@{/veterinarios/nuevo}" class="btn">
                <i class="fas fa-plus"></i> Agregar
            </a>

            <div class="search-container">
                <form method="get" action="/veterinarios">
                    <input type="text" name="search"
                           placeholder="Buscar por nombre, apellido o especialidad...">
                    <button type="submit">
                        <i class="fas fa-search"></i>
                    </button>
                </form>
            </div>
        </div>

        <!-- ===== Table ===== -->
        <table>
            <thead>
            <tr>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Teléfono</th>
                <th>Email</th>
                <th>Especialidad</th>
                <th>Código</th>
                <th>Acciones</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="veterinario : ${veterinarios}">
                <td th:text="${veterinario['nombre']}"></td>
                <td th:text="${veterinario['apellido']}"></td>
                <td th:text="${veterinario['telefono']}"></td>
                <td th:text="${veterinario['email']}"></td>
                <td th:text="${veterinario['especialidad']}"></td>
                <td th:text="${veterinario['codigo_colegiado']}"></td>

                <!-- ✔️ مثل بقیه صفحات -->
                <td class="actions">
                    <a th:href="@{'/veterinarios/editar/' + ${veterinario['id']}}"
                       class="icon-btn edit">
                        <i class="fas fa-pen"></i>
                    </a>

                    <a th:href="@{'/veterinarios/eliminar/' + ${veterinario['id']}}"
                       onclick="return confirm('¿Eliminar veterinario?');"
                       class="icon-btn delete">
                        <i class="fas fa-trash"></i>
                    </a>
                </td>
            </tr>

            <!-- حالت خالی -->
            <tr th:if="${#lists.isEmpty(veterinarios)}">
                <td colspan="7" style="text-align:center; padding:20px; color:#94a3b8;">
                    No hay veterinarios registrados
                </td>
            </tr>

            </tbody>
        </table>

    </div>
</div>

</body>
</html>
