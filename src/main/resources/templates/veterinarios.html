
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/propietario.css">
    <title>Lista de Veterinarios</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>

<div class="layout">

    <div class="sidebar">
        <h2>🐾 VidaPet</h2>
        <a href="/">
            <i class="fas fa-home"></i> Home
        </a>

        <a href="/propietarios">
            <i class="fas fa-user"></i> Propietarios
        </a>

        <a href="/especies">
            <i class="fas fa-paw"></i> Especies
        </a>

        <a href="/mascotas">
            <i class="fas fa-dog"></i> Mascotas
        </a>

        <a href="/citas">
            <i class="fas fa-calendar"></i> Citas
        </a>

        <a href="/consultas">
            <i class="fas fa-stethoscope"></i> Consultas
        </a>
    </div>
    <!-- ===== Main Content ===== -->
    <div class="main">

        <h1>Lista de Veterinarios</h1>

        <a th:href="@{/veterinarios/nuevo}" class="btn">
            <i class="fas fa-plus"></i> Agregar
        </a>

        <div class="search-container">
            <form method="get" action="/veterinarios">
                <input type="text" name="search" placeholder="Buscar por nombre, apellido o especialidad..." />
                <button type="submit">
                    <i class="fas fa-search"></i> Buscar
                </button>
            </form>
        </div>

        <table border="1">
            <thead>
            <tr>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Teléfono</th>
                <th>Email</th>
                <th>Especialidad</th>
                <th>Código Colegiado</th>
                <th>Acciones</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="veterinario : ${veterinarios}">
                <td th:text="${veterinario['nombre']}"></td>
                <td th:text="${veterinario['apellido']}"></td>
                <td th:text="${veterinario['telefono']}"></td>
                <td th:text="${veterinario['email']}"></td>
                <td th:text="${veterinario['especialidad']}"></td>
                <td th:text="${veterinario['codigo_colegiado']}"></td>

                <td>
                    <a th:href="@{'/veterinarios/editar/' + ${veterinario['id']}}" class="btn">
                        <i class="fas fa-edit"></i>
                    </a>

                    <a th:href="@{'/veterinarios/eliminar/' + ${veterinario['id']}}"
                       onclick="return confirm('¿Está seguro?');"
                       class="btn">
                        <i class="fas fa-trash-alt"></i>
                    </a>
                </td>
            </tr>
            </tbody>
        </table>

    </div>
</div>

</body>
</html>
```
