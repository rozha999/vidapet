<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/fmascota.css}">
    <title th:text="${mascota['id']} == '' ? 'Nueva Mascota' : 'Editar Mascota'"></title>
</head>
<body>

<h2 th:text="${mascota['id']} == '' ? 'Nueva Mascota' : 'Editar Mascota'"></h2>

<form th:action="${mascota['id'] == '' ? '/mascotas/guardar' : '/mascotas/actualizar'}"
      method="post"
      enctype="multipart/form-data">

    <input type="hidden" name="id" th:value="${mascota['id']}">

    <label>Nombre:</label>
    <input type="text" name="nombre" th:value="${mascota['nombre']}" required><br>

    <label>Especie:</label>
    <input type="text"
           id="especieInput"
           list="especiesList"
           placeholder="Buscar especie..."
           th:value="${mascota['especie_nombre']}"
           required>

    <datalist id="especiesList">
        <option th:each="e : ${especies}"
                th:value="${e['nombre']}"
                th:data-id="${e['id']}">
        </option>
    </datalist>

    <input type="hidden" name="especie_id" id="especie_id" th:value="${mascota['especie_id']}">
    <label>Raza:</label>
    <input type="text" name="raza" th:value="${mascota['raza']}" required><br>

    <label>Fecha de Nacimiento:</label>
    <input type="date" name="fecha_nacimiento" th:value="${mascota['fecha_nacimiento']}" required><br>

    <label>Propietario:</label>
    <input type="text" id="propietarioInput" list="propietariosList"
           th:value="${mascota['propietario_nombre'] != null ? mascota['propietario_nombre'] + ' ' + mascota['propietario_apellido'] : ''}"
           placeholder="Buscar propietario..." required>

    <datalist id="propietariosList">
        <option th:each="p : ${propietarios}"
                th:value="${p['nombre']} + ' ' + ${p['apellido']}"
                th:data-id="${p['id']}"></option>
    </datalist>
    <input type="hidden" name="propietario_id" id="propietario_id" th:value="${mascota['propietario_id']}">
    <br>

    <div th:if="${mascota['foto'] != null and mascota['foto'] != ''}">
        <p>Foto actual:</p>
        <img th:src="@{'/' + ${mascota['foto']}}" width="120" style="border-radius:8px;"><br>
    </div>
    <label>Foto:</label>
    <input type="file" name="foto" accept="image/*"><br><br>

    <button type="submit" th:text="${mascota['id'] == '' ? 'Guardar' : 'Actualizar'}"></button>
</form>

<br/>
<a href="/mascotas">Volver a la lista</a>

<script>
    function setupSearchableList(inputId, hiddenId, listId) {
        const input = document.getElementById(inputId);
        const hidden = document.getElementById(hiddenId);
        const options = document.querySelectorAll("#" + listId + " option");

        if (!input || !hidden) return;

        input.addEventListener("input", function () {
            hidden.value = ""; // ابتدا خالی کن
            options.forEach(opt => {
                if (opt.value === input.value) {
                    hidden.value = opt.getAttribute("data-id");
                }
            });
        });
    }

    // فعال سازی برای هر دو بخش بعد از لود شدن صفحه
    document.addEventListener("DOMContentLoaded", function() {
        // تنظیم جستجوی صاحب
        setupSearchableList("propietarioInput", "propietario_id", "propietariosList");
        // تنظیم جستجوی گونه
        setupSearchableList("especieInput", "especie_id", "especiesList");
    });
</script>

</body>
</html>
