<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/fmascota.css}">
    <title th:text="${#strings.isEmpty(mascota['id']) ? 'Nueva Mascota' : 'Editar Mascota'}"></title>
</head>
<body>

<div class="page">

    <div class="card">

        <!-- عنوان -->
        <h2 th:text="${#strings.isEmpty(mascota['id']) ? 'Nueva Mascota' : 'Editar Mascota'}"></h2>

        <!-- فرم -->
        <form th:action="${#strings.isEmpty(mascota['id']) ? '/mascotas/guardar' : '/mascotas/actualizar'}"
              method="post"
              enctype="multipart/form-data">

            <input type="hidden" name="id" th:value="${mascota['id']}">

            <!-- Nombre -->
            <label>Nombre:</label>
            <input type="text" name="nombre" th:value="${mascota['nombre']}" required>

            <!-- Especie -->
            <label>Especie:</label>
            <input type="text"
                   id="especieInput"
                   list="especiesList"
                   th:value="${mascota['especie_nombre']}"
                   placeholder="Buscar especie..." required>

            <datalist id="especiesList">
                <option th:each="e : ${especies}"
                        th:value="${e['nombre']}"
                        th:data-id="${e['id']}"></option>
            </datalist>

            <input type="hidden" name="especie_id" id="especie_id"
                   th:value="${mascota['especie_id']}">

            <!-- Raza -->
            <label>Raza:</label>
            <input type="text" name="raza" th:value="${mascota['raza']}" required>

            <!-- Fecha -->
            <label>Fecha de Nacimiento:</label>
            <input type="date" name="fecha_nacimiento"
                   th:value="${mascota['fecha_nacimiento']}" required>

            <!-- Propietario -->
            <label>Propietario:</label>
            <input type="text"
                   id="propietarioInput"
                   list="propietariosList"
                   th:value="${mascota['propietario_nombre']}"
                   placeholder="Buscar propietario..." required>

            <datalist id="propietariosList">
                <option th:each="p : ${propietarios}"
                        th:value="${p['nombre']} + ' ' + ${p['apellido']}"
                        th:data-id="${p['id']}"></option>
            </datalist>

            <input type="hidden" name="propietario_id" id="propietario_id"
                   th:value="${mascota['propietario_id']}">

            <!-- Foto -->
            <label>Foto:</label>
            <input type="file" name="foto" accept="image/*">

            <button type="submit"
                    th:text="${#strings.isEmpty(mascota['id']) ? 'Guardar' : 'Actualizar'}">
            </button>
        </form>

        <!-- volver -->
        <a class="back" href="/mascotas">← Volver a la lista</a>

    </div>
</div>

<!-- JS -->
<script>
    function setupSearchableList(inputId, hiddenId, listId) {
        const input = document.getElementById(inputId);
        const hidden = document.getElementById(hiddenId);
        const options = document.querySelectorAll("#" + listId + " option");

        input.addEventListener("input", function () {
            hidden.value = "";
            options.forEach(opt => {
                if (opt.value === input.value) {
                    hidden.value = opt.getAttribute("data-id");
                }
            });
        });
    }

    document.addEventListener("DOMContentLoaded", function () {
        setupSearchableList("propietarioInput", "propietario_id", "propietariosList");
        setupSearchableList("especieInput", "especie_id", "especiesList");
    });
</script>

</body>
</html>
