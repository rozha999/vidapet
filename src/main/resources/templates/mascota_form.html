<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${#strings.isEmpty(mascota['id']) ? 'Nueva Mascota - VidaPet' : 'Editar Mascota - VidaPet'}">VidaPET</title>

    <link rel="stylesheet" th:href="@{/css/fmascota.css}">
    <link rel="stylesheet" th:href="@{/css/mascota.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="layout">

    <aside class="sidebar">
        <header>
            <h1>| VidaPET</h1>
        </header>
        <nav aria-label="Menú principal">
            <a th:href="@{/}"><i class="fas fa-home" aria-hidden="true"></i> <span>Home</span></a>
            <a th:href="@{/propietarios}"><i class="fas fa-user" aria-hidden="true"></i> <span>Propietarios</span></a>
            <a th:href="@{/mascotas}" class="active"><i class="fas fa-dog" aria-hidden="true"></i> <span>Mascotas</span></a>
            <a th:href="@{/veterinarios}"><i class="fas fa-user-md" aria-hidden="true"></i> <span>Veterinarios</span></a>
            <a th:href="@{/especies}"><i class="fas fa-paw" aria-hidden="true"></i> <span>Especies</span></a>
            <a th:href="@{/citas}"><i class="fas fa-calendar" aria-hidden="true"></i> <span>Citas</span></a>
            <a th:href="@{/consultas}"><i class="fas fa-stethoscope" aria-hidden="true"></i> <span>Consultas</span></a>
        </nav>
        <figure class="logo-container">
            <img th:src="@{/images/www.png}" class="logo" alt="Logotipo oficial VidaPet">
        </figure>
    </aside>

    <main class="main">

        <header>
            <h1 th:text="${#strings.isEmpty(mascota['id']) ? 'Nueva Mascota' : 'Editar Mascota'}">Formulario Mascota</h1>
        </header>

        <section class="card-form" aria-labelledby="form-title">
            <form th:action="${#strings.isEmpty(mascota['id']) ? '/mascotas/guardar' : '/mascotas/actualizar'}"
                  method="post"
                  enctype="multipart/form-data">

                <input type="hidden" name="id" th:value="${mascota['id']}">

                <div class="form-group">
                    <label for="nombre"><i class="fas fa-signature" aria-hidden="true"></i> Nombre:</label>
                    <input type="text" id="nombre" name="nombre" th:value="${mascota['nombre']}" required placeholder="Nombre de la mascota">
                </div>

                <div class="form-group">
                    <label for="especieInput"><i class="fas fa-paw" aria-hidden="true"></i> Especie:</label>
                    <input type="text"
                           id="especieInput"
                           list="especiesList"
                           th:value="${mascota['especie_nombre']}"
                           placeholder="Escribe para buscar especie..." required>

                    <datalist id="especiesList">
                        <option th:each="e : ${especies}"
                                th:value="${e['nombre']}"
                                th:data-id="${e['id']}"></option>
                    </datalist>
                    <input type="hidden" name="especie_id" id="especie_id" th:value="${mascota['especie_id']}">
                </div>

                <div class="form-group">
                    <label for="raza"><i class="fas fa-dna" aria-hidden="true"></i> Raza:</label>
                    <input type="text" id="raza" name="raza" th:value="${mascota['raza']}" required placeholder="Ej: Labrador, Siamés...">
                </div>

                <div class="form-group">
                    <label for="fecha_nacimiento"><i class="fas fa-calendar-alt" aria-hidden="true"></i> Fecha de Nacimiento:</label>
                    <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" th:value="${mascota['fecha_nacimiento']}" required>
                </div>

                <div class="form-group">
                    <label for="propietarioInput"><i class="fas fa-user" aria-hidden="true"></i> Propietario:</label>
                    <input type="text"
                           id="propietarioInput"
                           list="propietariosList"
                           th:value="${mascota['propietario_nombre']}"
                           placeholder="Escribe para buscar dueño..." required>

                    <datalist id="propietariosList">
                        <option th:each="p : ${propietarios}"
                                th:value="${p['nombre']} + ' ' + ${p['apellido']}"
                                th:data-id="${p['id']}"></option>
                    </datalist>
                    <input type="hidden" name="propietario_id" id="propietario_id" th:value="${mascota['propietario_id']}">
                </div>

                <div class="form-group">
                    <label for="foto"><i class="fas fa-camera" aria-hidden="true"></i> Foto de Mascota:</label>
                    <input type="file" id="foto" name="foto" accept="image/*" class="file-input">
                </div>

                <footer class="form-actions">
                    <button type="submit" class="btn">
                        <i class="fas fa-save" aria-hidden="true"></i>
                        <span th:text="${#strings.isEmpty(mascota['id']) ? ' Guardar' : ' Actualizar'}"></span>
                    </button>
                    <a th:href="@{/mascotas}" class="btn-secondary">
                        <i class="fas fa-arrow-left" aria-hidden="true"></i> Volver
                    </a>
                </footer>
            </form>
        </section>
    </main>
</div>

<script>
    /**
     * Sincroniza el valor de un datalist con un input oculto (hidden)
     */
    function setupSearchableList(inputId, hiddenId, listId) {
        const input = document.getElementById(inputId);
        const hidden = document.getElementById(hiddenId);

        input.addEventListener("input", function () {
            const list = document.getElementById(listId);
            const options = list.querySelectorAll("option");
            hidden.value = "";

            options.forEach(opt => {
                if (opt.value === input.value) {
                    hidden.value = opt.getAttribute("data-id");
                }
            });
        });
    }

    document.addEventListener("DOMContentLoaded", function () {
        setupSearchableList("propietarioInput", "propietario_id", "propietariosList");
        setupSearchableList("especieInput", "especie_id", "especiesList");
    });
</script>

</body>
</html>
