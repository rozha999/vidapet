<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/fmascota.css}">
    <title th:text="${mascota['id']} == '' ? 'Nueva Mascota' : 'Editar Mascota'">Formulario Mascota</title>
</head>
<body>

<h2 th:text="${mascota['id']} == '' ? 'Nueva Mascota' : 'Editar Mascota'"></h2>

<!-- ===== Formulario para agregar nueva mascota ===== -->
<form th:if="${mascota['id']} == ''"
      th:action="@{/mascotas/guardar}"
      method="post">

    <label>Nombre:</label>
    <input type="text" name="nombre" th:value="${mascota['nombre']}" required><br>

    <label>Especie:</label>
    <input type="text" name="especie" th:value="${mascota['especie']}" required><br>

    <label>Raza:</label>
    <input type="text" name="raza" th:value="${mascota['raza']}" required><br>

    <label for="fecha_nacimiento">Fecha de Nacimiento:</label>
    <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" th:value="${mascota['fecha_nacimiento']}" required><br>

    <label>Propietario:</label>
    <select name="propietario_id" required>
        <option value="">-- Seleccione un propietario --</option>
        <option th:each="p : ${propietarios}"
                th:value="${p['id']}"
                th:text="${p['nombre']} + ' ' + ${p['apellido']}">
        </option>
    </select><br><br>

    <button type="submit">Guardar</button>
</form>

<!-- ===== Formulario para editar mascota existente ===== -->
<form th:if="${mascota['id']} != ''"
      th:action="@{/mascotas/actualizar}"
      method="post">

    <input type="hidden" name="id" th:value="${mascota['id']}">

    <label>Nombre:</label>
    <input type="text" name="nombre" th:value="${mascota['nombre']}" required><br>

    <label>Especie:</label>
    <input type="text" name="especie" th:value="${mascota['especie']}" required><br>

    <label>Raza:</label>
    <input type="text" name="raza" th:value="${mascota['raza']}" required><br>

    <label for="fecha_nacimiento">Fecha de Nacimiento:</label>
    <input type="date" id="fecha_nacimiento" name="fecha_nacimiento"
           th:value="${mascota['fecha_nacimiento']}" required><br>

    <label>Propietario:</label>
    <select name="propietario_id" required>
        <option value="">-- Seleccione un propietario --</option>
        <option th:each="p : ${propietarios}"
                th:value="${p['id']}"
                th:text="${p['nombre']} + ' ' + ${p['apellido']}"
                th:selected="${mascota['propietario_id']} == ${p['id']}">
        </option>
    </select><br><br>

    <button type="submit">Actualizar</button>
</form>

<br/>
<a href="/mascotas">Volver a la lista</a>

</body>
</html>
