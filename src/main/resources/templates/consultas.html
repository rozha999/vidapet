<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Historial de Consultas - VidaPet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* ===== BODY ===== */
        body {
            background: linear-gradient(135deg, #f6f8ff, #fdf6ff);
            font-family: 'Segoe UI', sans-serif;
            color: #444;
            margin-left: 260px; /* اضافه شده برای جلوگیری از تداخل با سایدبار */
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 240px;
            height: 100vh;
            background: linear-gradient(180deg, #e0e7ff, #f5e8ff);
            padding: 25px;
            box-shadow: 4px 0 20px rgba(120, 110, 255, 0.08);
            z-index: 1000;
        }

        .sidebar h2 {
            text-align: center;
            color: #6d72f6;
            font-weight: 800;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            padding: 12px 15px;
            margin: 8px 0;
            text-decoration: none;
            color: #6b7280;
            border-radius: 12px;
            transition: 0.3s;
        }

        .sidebar a i {
            margin-right: 8px;
        }

        .sidebar a:hover {
            background: white;
            color: #6d72f6;
            transform: translateX(6px);
        }

        /* ===== HEADER ===== */
        h2 { color: #6d72f6; }

        /* ===== SEARCH BOX ===== */
        .search-box input {
            border-radius: 50px 0 0 50px;
            border: 1px solid #dcdcff;
            padding: 10px 20px;
        }

        .search-btn {
            border-radius: 0 50px 50px 0;
            background: #6d72f6;
            color: white;
            border: none;
            padding: 0 20px;
        }

        /* ===== CARD & TABLE ===== */
        .card {
            border-radius: 20px;
            background: #ffffff;
            box-shadow: 0 10px 30px rgba(120, 110, 255, 0.08);
            border: none;
        }

        .table thead {
            background: linear-gradient(90deg, #818cf8, #c084fc);
            color: white;
        }

        .mascota-name {
            font-weight: 700;
            color: #6366f1;
        }

        .btn-action {
            width: 35px;
            height: 35px;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 0 2px;
        }

        @media (max-width: 768px) {
            body { margin-left: 0; }
            .sidebar { position: relative; width: 100%; height: auto; }
        }
    </style>
</head>
<body class="py-5 px-4">

<div class="sidebar">
    <h2>🐾 VidaPet</h2>
    <a href="/"><i class="fas fa-home"></i> Home</a>
    <a href="/propietarios"><i class="fas fa-user"></i> Propietarios</a>
    <a href="/especies"><i class="fas fa-paw"></i> Especies</a>
    <a href="/mascotas"><i class="fas fa-dog"></i> Mascotas</a>
    <a href="/citas"><i class="fas fa-calendar"></i> Citas</a>
    <a href="/consultas"><i class="fas fa-stethoscope"></i> Consultas</a>
</div>

<div class="container-fluid">
    <div class="row mb-4 align-items-center">
        <div class="col-md-6">
            <h2 class="fw-bold text-dark m-0">
                <i class="fas fa-file-medical-alt me-2 text-primary"></i>Consultas
            </h2>
        </div>

        <div class="col-md-6">
            <form th:action="@{/consultas/buscar}" method="get" class="d-flex justify-content-end">
                <div class="input-group search-box" style="max-width: 400px;">
                    <input type="text" name="nombre" th:value="${nombre}"
                           class="form-control"
                           placeholder="Nombre de la mascota...">
                    <button class="search-btn" type="submit">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="card p-4">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                <tr>
                    <th>Mascota</th>
                    <th>Diagnóstico</th>
                    <th>Fecha</th>
                    <th class="text-center">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c : ${consultas}">
                    <td>
                        <div class="mascota-name" th:text="${c.mascota_nombre}">Nombre</div>
                    </td>
                    <td>
                        <span class="text-muted" th:text="${#strings.abbreviate(c.diagnostico, 60)}">Diagnóstico...</span>
                    </td>
                    <td class="small text-secondary"
                        th:text="${c.fecha != null ? c.fecha : 'Sin fecha'}"></td>
                    <td class="text-center">
                        <a th:href="@{'/consultas/' + ${c.id}}" class="btn btn-info btn-action text-white" title="Ver Detalle">
                            <i class="fas fa-eye"></i>
                        </a>
                        <a th:href="@{'/consultas/editar/' + ${c.id}}" class="btn btn-warning btn-action text-white" title="Editar">
                            <i class="fas fa-edit"></i>
                        </a>
                        <a th:href="@{'/consultas/eliminar/' + ${c.id}}"
                           class="btn btn-danger btn-action text-white"
                           onclick="return confirm('¿Borrar esta consulta?')" title="Eliminar">
                            <i class="fas fa-trash"></i>
                        </a>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(consultas)}">
                    <td colspan="4" class="text-center py-5">
                        <div class="text-muted">
                            <i class="fas fa-search fa-3x mb-3"></i>
                            <p>No se encontraron consultas.</p>
                            <a th:href="@{/consultas}" class="btn btn-outline-primary btn-sm">Ver todas</a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
