<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Consultas - VidaPet</title>

    <link rel="stylesheet" href="/css/consultas.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
    /* ===== Base ===== */
    body {
        background: linear-gradient(135deg, #eef2ff 0%, #f5f7ff 100%);
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        margin: 0;
        color: #334155;
        min-height: 100vh;
    }

    /* ===== Layout ===== */
    .layout {
        display: flex;
    }

    /* ===== Sidebar ===== */
    .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        width: 260px;
        height: 100vh;
        background: #ffffff;
        padding: 25px 15px;
        box-shadow: 4px 0 20px rgba(99, 102, 241, 0.12);
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .sidebar h1 {
        color: #6366f1;
        font-size: 1.8rem;
        font-weight: 800;
        text-align: center;
        margin-bottom: 30px;
    }

    .sidebar a {
        text-decoration: none;
        color: #64748b;
        padding: 12px 20px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        gap: 12px;
        transition: 0.3s;
    }

    .sidebar a:hover {
        background-color: #eef2ff;
        color: #6366f1;
        transform: translateX(5px);
    }

    /* active page */
    .sidebar a[href="/consultas"],
    .sidebar a.active {
        background: linear-gradient(90deg, #a5b4fc, #818cf8);
        color: white;
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
    }

    /* ===== Logo ===== */
.logo {
    margin-top: auto; /* چسبیدن به انتهای سایدبار */
    margin-bottom: 20px;
    height: 210px;
    width: auto;
    align-self: center;
    opacity: 0.2; /* حالت محو */
    filter: brightness(1.1) blur(0.5px);
    transition: opacity 0.3s;
}

.logo:hover {
    opacity: 0.8;
}

    /* ===== Main ===== */
    .main {
        margin-left: 260px;
        padding: 40px;
        width: 100%;
        animation: fadeIn 0.6s ease;
    }

    .main h1 {
        color: #4f46e5;
        font-size: 2.2rem;
        margin-bottom: 25px;
        font-weight: 800;
    }

    /* ===== Top bar ===== */
    .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    /* ===== Button ===== */
    .btn {
        background: linear-gradient(90deg, #a5b4fc, #818cf8);
        color: white;
        padding: 10px 18px;
        border-radius: 12px;
        text-decoration: none;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: 0.3s;
        box-shadow: 0 4px 10px rgba(99, 102, 241, 0.2);
    }

    .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 15px rgba(99, 102, 241, 0.3);
    }

    /* ===== Search ===== */
    .search-container {
        display: flex;
        gap: 6px;
    }

    .search-container input {
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid #e0e7ff;
        outline: none;
        background: #fff;
    }

    .search-container input:focus {
        border-color: #818cf8;
        box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.2);
    }

    .search-container button {
        background: #6366f1;
        border: none;
        color: white;
        padding: 10px 14px;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.3s;
    }

    .search-container button:hover {
        background: #4f46e5;
    }

    /* ===== Table ===== */
    table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0 10px;
    }

    th {
        text-align: left;
        padding: 15px;
        color: #4f46e5;
        font-size: 0.85rem;
        text-transform: uppercase;
    }

    td {
        padding: 15px;
        background: #f8fafc;
        color: #334155;
        border: none;
    }

    /* hover */
    tbody tr:hover td {
        background: #eef2ff;
        transition: 0.2s;
    }

    /* ===== Pet name highlight ===== */
    .pet-name {
        font-weight: 700;
        color: #6366f1;
    }

    /* muted text */
    .muted {
        color: #94a3b8;
        font-size: 0.9rem;
    }

    /* ===== Actions ===== */
    .actions {
        display: flex;
        gap: 8px;
    }

    .icon-btn {
        width: 35px;
        height: 35px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        transition: 0.2s;
    }

    .icon-btn.edit {
        background: #e0e7ff;
        color: #4f46e5;
    }

    .icon-btn.edit:hover {
        background: #6366f1;
        color: white;
        transform: scale(1.08);
    }

    .icon-btn.delete {
        background: #fee2e2;
        color: #ef4444;
    }

    .icon-btn.delete:hover {
        background: #ef4444;
        color: white;
        transform: scale(1.08);
    }

    /* ===== Empty state ===== */
    .empty {
        text-align: center;
        padding: 40px;
        color: #94a3b8;
    }

    /* ===== Animation ===== */
    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(15px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

</head>

<body>

<div class="layout">

    <!-- ===== Sidebar ===== -->
    <div class="sidebar">
        <h1>| VidaPET</h1>

        <a href="/"><i class="fas fa-home"></i> Home</a>
        <a href="/propietarios"><i class="fas fa-user"></i> Propietarios</a>
        <a href="/mascotas"><i class="fas fa-dog"></i> Mascotas</a>
        <a href="/veterinarios"><i class="fas fa-user-md"></i> Veterinarios</a>
        <a href="/especies"><i class="fas fa-paw"></i> Especies</a>
        <a href="/citas"><i class="fas fa-calendar"></i> Citas</a>
        <a href="/consultas"><i class="fas fa-stethoscope"></i> Consultas</a>

        <img src="/images/www.png" class="logo" alt="VidaPet">
    </div>

    <!-- ===== Main ===== -->
    <div class="main">

        <h1>
            <i class="fas fa-file-medical-alt"></i> Consultas
        </h1>

        <!-- top bar -->
        <div class="top-bar">

            <form th:action="@{/consultas/buscar}" method="get" class="search-container">
                <input type="text" name="nombre" th:value="${nombre}" placeholder="🐶 Nombre mascota...">
                <button type="submit">
                    <i class="fas fa-search"></i>
                </button>
            </form>

        </div>

        <!-- table -->
        <table>
            <thead>
            <tr>
                <th>Mascota</th>
                <th>Diagnóstico</th>
                <th>Fecha</th>
                <th>Acciones</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="c : ${consultas}">

                <td class="pet-name" th:text="${c.mascota_nombre}"></td>

                <td class="muted"
                    th:text="${#strings.abbreviate(c.diagnostico, 60)}"></td>

                <td class="date"
                    th:text="${c.fecha != null ? c.fecha : 'Sin fecha'}"></td>

                <td class="actions">

                    <a th:href="@{'/consultas/' + ${c.id}}"
                       class="icon-btn edit"
                       title="Ver">
                        <i class="fas fa-eye"></i>
                    </a>



                    <a th:href="@{'/consultas/eliminar/' + ${c.id}}"
                       class="icon-btn delete"
                       onclick="return confirm('¿Borrar consulta?')"
                       title="Eliminar">
                        <i class="fas fa-trash"></i>
                    </a>

                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(consultas)}">
                <td colspan="4" class="empty">
                    <i class="fas fa-search"></i>
                    <p>No se encontraron consultas</p>
                    <a href="/consultas" class="btn">Ver todas</a>
                </td>
            </tr>

            </tbody>
        </table>

    </div>
</div>

</body>
</html>
