<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Consultas - VidaPet</title>
    <link rel="stylesheet" th:href="@{/css/consultas.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
    body {
        background: linear-gradient(135deg, #eef2ff 0%, #f5f7ff 100%);
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        margin: 0;
        color: #334155;
        min-height: 100vh;
    }

    .layout {
        display: flex;
    }

    /* ===== 2. Sidebar (aside) ===== */
    aside.sidebar {
        position: fixed;
        top: 0;
        left: 0;
        width: 260px;
        height: 100vh;
        background: #ffffff;
        padding: 25px 15px;
        box-shadow: 4px 0 20px rgba(99, 102, 241, 0.1);
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 1000;
        box-sizing: border-box;
    }

    aside.sidebar header h1 {
        color: #6366f1;
        font-size: 1.6rem;
        font-weight: 800;
        text-align: center;
        margin-bottom: 25px;
    }

    aside.sidebar nav {
        display: flex;
        flex-direction: column;
        gap: 5px;
    }

    aside.sidebar nav a {
        text-decoration: none;
        color: #64748b;
        padding: 12px 18px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 500;
        transition: all 0.3s ease;
    }

    aside.sidebar nav a:hover {
        background-color: #f8faff;
        color: #6366f1;
        transform: translateX(4px);
    }

    aside.sidebar nav a[href*="/consultas"] {
        background: linear-gradient(90deg, #818cf8, #6366f1);
        color: white;
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
    }

    .logo {
        margin-top: auto;
        margin-bottom: 10px;
        max-height: 180px;
        width: auto;
        align-self: center;
        opacity: 0.15;
        filter: grayscale(1);
        transition: opacity 0.4s ease;
    }

    aside.sidebar:hover .logo {
        opacity: 0.6;
        filter: grayscale(0);
    }

    /* ===== 3. Main Content (main) ===== */
    main.main {
        margin-left: 260px;
        padding: 40px;
        width: calc(100% - 260px);
        box-sizing: border-box;
        animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    main.main header h1 {
        color: #1e1b4b;
        font-size: 2rem;
        margin-bottom: 30px;
        font-weight: 800;
    }

    /* ===== 4. Top Bar & Search ===== */
    .top-bar {
        display: flex;
        justify-content: flex-start;
        margin-bottom: 20px;
    }

    .search-container {
        display: flex;
        gap: 8px;
        background: white;
        padding: 6px;
        border-radius: 14px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .search-container input {
        padding: 10px 15px;
        border-radius: 10px;
        border: 1px solid #e2e8f0;
        outline: none;
        min-width: 250px;
    }

    .search-container button {
        background: #6366f1;
        border: none;
        color: white;
        padding: 0 18px;
        border-radius: 10px;
        cursor: pointer;
    }

    /* ===== 5. Compact Table (section) ===== */
    table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0 6px; /* Espacio reducido entre filas */
    }

    th {
        text-align: left;
        padding: 10px 20px;
        color: #6366f1;
        font-size: 0.8rem;
        text-transform: uppercase;
        font-weight: 700;
    }

    td {
        padding: 8px 20px; /* Altura compacta */
        background: #ffffff;
        color: #475569;
        border: none;
        font-size: 0.92rem;
    }

    td:first-child { border-radius: 12px 0 0 12px; }
    td:last-child { border-radius: 0 12px 12px 0; }

    tbody tr:hover td {
        background: #fcfdff;
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.05);
    }

    /* ===== 6. Acciones (Botones al lado del otro) ===== */
    .actions nav {
        display: flex;
        flex-direction: row; /* Asegura que estén en línea */
        gap: 8px;
        align-items: center;
    }

    .icon-btn {
        width: 32px; /* Tamaño optimizado */
        height: 32px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        transition: all 0.2s;
        font-size: 0.9rem;
    }

    .icon-btn.edit { background: #eef2ff; color: #6366f1; }
    .icon-btn.edit:hover { background: #6366f1; color: white; }

    .icon-btn.delete { background: #fff1f2; color: #ef4444; }
    .icon-btn.delete:hover { background: #ef4444; color: white; }

    /* ===== 7. Utils ===== */
    .pet-name { font-weight: 700; color: #4338ca; }

    .muted {
        color: #94a3b8;
        font-size: 0.85rem;
        max-width: 350px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis; /* Evita que el texto largo estire la fila */
    }

    /* ===== 8. Empty State & Animations ===== */
    .empty {
        text-align: center;
        padding: 50px;
        background: white;
        border-radius: 20px;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
    }

        /* ================= RESPONSIVE ================= */

        /* TABLET */
        @media (max-width: 1024px) {

            aside.sidebar {
                width: 220px;
            }

            main.main {
                margin-left: 220px;
                width: calc(100% - 220px);
                padding: 25px;
            }

            search.search-container input {
                width: 180px;
            }
        }

        /* MOBILE */
        @media (max-width: 768px) {

            .layout {
                flex-direction: column;
            }

            aside.sidebar {
                position: relative;
                width: 100% !important;
                height: auto !important;
                padding: 15px 10px !important;
                display: flex !important;
                flex-direction: column !important;
                align-items: center;
                box-shadow: 0 4px 15px rgba(0,0,0,0.05);
                left: 0 !important;
            }


            .logo, .logo-container {
                display: none !important;
            }

            aside.sidebar header h1 {
                width: 100%;
                margin-bottom: 15px !important;
                font-size: 1.4rem !important;
                text-align: center;
            }

            aside.sidebar nav {
                display: flex !important;
                flex-direction: row !important;
                flex-wrap: wrap !important;
                justify-content: center !important;
                gap: 8px !important;
                width: 100% !important;
            }
            aside.sidebar nav ul {
                display: flex;
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                gap: 10px;
                list-style: none;
                padding: 0;
            }

            aside.sidebar nav a {
                display: flex !important;
                flex-direction: row !important;
                align-items: center;
                padding: 8px 12px !important;
                min-width: auto !important;
                flex: 0 1 auto !important;
                font-size: 0.8rem !important;
                gap: 6px !important;
                border-radius: 10px !important;
                background: #f8fafc !important;
                white-space: nowrap !important;
            }
            aside.sidebar nav a i {
                font-size: 1rem !important;
                margin: 0 !important;
            }


            aside.sidebar nav a:hover {
                transform: scale(1.02);
            }

            .logo-container {
                display: none;
            }


            main.main {
                margin-left: 0;
                width: 100%;
                padding: 20px;
            }

            /* AJUSTE DE TABLA PARA QUE NO SE DESBORDE */
            .table-container {
                overflow-x: auto;
            }

            table {
                width: 100%;
                table-layout: fixed; /* Mantiene proporciones */
            }

            th, td {
                padding: 8px 4px;
                font-size: 0.7rem;
                text-align: center;
                word-break: break-word;
                white-space: normal; /* Permite que el texto largo salte de línea */
            }

            .td-photo img {
                width: 45px;
                height: 45px;
            }

            .top-bar {
                flex-direction: column;
                gap: 15px;
            }

            search.search-container input {
                width: 100%;
            }

            .icon-btn {
                width: 30px;
                height: 30px;
            }

            aside.sidebar nav a[href*="/consultas"]{
                background: linear-gradient(90deg, #818cf8, #6366f1) !important;
                color: white !important;
                box-shadow: 0 4px 10px rgba(99, 102, 241, 0.2);
            }


            aside.sidebar nav a {
                color: #64748b !important;
            }

            aside.sidebar nav a i {
                color: #6366f1 !important;
            }
        }
    </style>
</head>

<body>

<div class="layout">

    <aside class="sidebar">
        <header>
            <h1>| VidaPET</h1>
        </header>

        <nav aria-label="Menú principal">
            <a th:href="@{/}"><i class="fas fa-home"></i> <span>Home</span></a>
            <a th:href="@{/propietarios}"><i class="fas fa-user"></i> <span>Propietarios</span></a>
            <a th:href="@{/mascotas}"><i class="fas fa-dog"></i> <span>Mascotas</span></a>
            <a th:href="@{/veterinarios}"><i class="fas fa-user-md"></i> <span>Veterinarios</span></a>
            <a th:href="@{/especies}"><i class="fas fa-paw"></i> <span>Especies</span></a>
            <a th:href="@{/citas}"><i class="fas fa-calendar"></i> <span>Citas</span></a>
            <a th:href="@{/consultas}"><i class="fas fa-stethoscope"></i> <span>Consultas</span></a>
        </nav>

        <img th:src="@{/images/www.png}" class="logo" alt="Logotipo VidaPet">
    </aside>

    <main class="main">

        <header>
            <h1><i class="fas fa-file-medical-alt" aria-hidden="true"></i> Consultas</h1>
        </header>

        <section class="top-bar" aria-label="Búsqueda de consultas">
            <form th:action="@{/consultas/buscar}" method="get" class="search-container" role="search">
                <input type="text" name="nombre" th:value="${nombre}" placeholder="🐶 Nombre mascota..." aria-label="Buscar por nombre de mascota">
                <button type="submit" aria-label="Ejecutar búsqueda">
                    <i class="fas fa-search"></i>
                </button>
            </form>
        </section>

        <section class="table-container">
            <table>
                <thead>
                <tr>
                    <th scope="col">Mascota</th>
                    <th scope="col">Diagnóstico</th>
                    <th scope="col">Fecha</th>
                    <th scope="col">Acciones</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="c : ${consultas}">
                    <td class="pet-name" th:text="${c.mascota_nombre}"></td>

                    <td class="muted"
                        th:text="${#strings.abbreviate(c.diagnostico, 60)}"></td>

                    <td class="date">
                        <time th:datetime="${c.fecha}" th:text="${c.fecha != null ? c.fecha : 'Sin fecha'}"></time>
                    </td>

                    <td class="actions">
                        <nav aria-label="Acciones de consulta">
                            <a th:href="@{'/consultas/' + ${c.id}}"
                               class="icon-btn edit"
                               title="Ver detalle completo">
                                <i class="fas fa-eye" aria-hidden="true"></i>
                            </a>

                            <a th:href="@{'/consultas/eliminar/' + ${c.id}}"
                               class="icon-btn delete"
                               onclick="return confirm('¿Está seguro de borrar esta consulta permanentemente?')"
                               title="Eliminar registro">
                                <i class="fas fa-trash" aria-hidden="true"></i>
                            </a>
                        </nav>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(consultas)}">
                    <td colspan="4">
                        <div class="empty">
                            <i class="fas fa-search fa-3x mb-3" style="color: #cbd5e1" aria-hidden="true"></i>
                            <p class="h5">No se encontraron consultas registradas</p>
                            <a th:href="@{/consultas}" class="btn">
                                <i class="fas fa-sync-alt me-2"></i> Ver todas las consultas
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </section>

    </main>
</div>

</body>
</html>
