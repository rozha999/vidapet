<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Consultas - VidaPet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

<h1 class="mb-4">Lista de Consultas</h1>

<a th:href="@{/consulta/nueva}" class="btn btn-primary mb-3">Agregar Consulta</a>

<table class="table table-bordered">
    <thead>
    <tr>
        <th>ID</th>
        <th>Mascota</th>
        <th>Diagnóstico</th>
        <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="c : ${consultas}">
        <td th:text="${c['id']}"></td>
        <td th:text="${c['mascota_id']}"></td>
        <td th:text="${c['diagnostico']}"></td>
        <td>
            <a th:href="@{'/consulta/editar/' + ${c['id']}}" class="btn btn-warning btn-sm">Editar</a>
            <a th:href="@{'/consulta/eliminar/' + ${c['id']}}" class="btn btn-danger btn-sm"
               onclick="return confirm('¿Está seguro de eliminar esta consulta?');">Eliminar</a>
        </td>
    </tr>
    </tbody>
</table>

<a href="/" class="btn btn-secondary mt-3">Volver al inicio</a>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
