<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Consultas - VidaPet</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* ===== BASE ===== */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #f7f9ff, #eef3ff);
            color: #333;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 230px;
            height: 100vh;
            background: linear-gradient(180deg, #dfe7ff, #f3e8ff);
            padding: 20px;
            box-shadow: 2px 0 15px rgba(0,0,0,0.05);
        }

        .sidebar h2 {
            color: #5a6ac4;
            margin-bottom: 25px;
            font-weight: 700;
        }

        .sidebar a {
            display: block;
            padding: 10px 12px;
            margin: 6px 0;
            text-decoration: none;
            color: #4a5568;
            border-radius: 10px;
            transition: 0.2s;
            font-weight: 500;
        }

        .sidebar a:hover {
            background: #eef2ff;
            color: #5a6ac4;
        }

        /* ===== CONTENT SHIFT (IMPORTANT) ===== */
        .container {
            margin-left: 260px;
            background: #ffffff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 25px rgba(80, 100, 200, 0.10);
        }

        /* ===== TITLE ===== */
        h1 {
            color: #5a6ac4;
            font-weight: 700;
        }

        /* ===== SEARCH ===== */
        .input-group input {
            border-radius: 10px 0 0 10px;
            border: 1px solid #cfd6ff;
        }

        .input-group input:focus {
            border-color: #6b7cff;
            box-shadow: 0 0 0 3px rgba(107, 124, 255, 0.15);
        }

        .input-group button {
            background: #6b7cff;
            border: none;
            color: white;
        }

        .input-group button:hover {
            background: #4f5bd5;
        }

        .input-group a {
            background: #f7b2ff;
            color: #3b3b3b;
            border-radius: 8px;
            padding: 6px 12px;
        }

        /* ===== TABLE ===== */
        table {
            border-radius: 12px;
            overflow: hidden;
            background: white;
            box-shadow: 0 6px 18px rgba(80, 100, 200, 0.08);
        }

        thead {
            background: linear-gradient(90deg, #6b7cff, #b58cff, #ff9ed2);
            color: white;
            text-align: center;
        }

        tbody tr:hover {
            background: #f3f6ff;
        }

        td, th {
            text-align: center;
            vertical-align: middle;
            padding: 12px;
        }

        /* ===== BUTTONS ===== */
        .btn-primary {
            background: #6b7cff !important;
            border: none !important;
        }

        .btn-primary:hover {
            background: #4f5bd5 !important;
        }

        .btn-warning {
            background: #b58cff !important;
            border: none !important;
            color: white !important;
        }

        .btn-danger {
            background: #ff6b8a !important;
            border: none !important;
        }

        .btn-info {
            background: #7cc4ff !important;
            border: none !important;
            color: white !important;
        }

        .btn-warning:hover { background: #9c6cff !important; }
        .btn-danger:hover { background: #ff4f73 !important; }
        .btn-info:hover { background: #5bb2ff !important; }

        /* ===== LIST ===== */
        td ul {
            margin: 0;
            padding: 0;
            list-style: none;
        }

        td ul li {
            background: #eef2ff;
            margin: 3px;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 13px;
        }
    </style>

</head>

<body class="p-4">
<!-- ===== Sidebar ===== -->
<div class="sidebar">
    <h2>🐾 VidaPet</h2>

    <a href="/"><i class="fas fa-home"></i> Home</a>
    <a href="/propietarios"><i class="fas fa-user"></i> Propietarios</a>
    <a href="/mascotas"><i class="fas fa-dog"></i> Mascotas</a>
    <a href="/citas"><i class="fas fa-calendar"></i> Citas</a>
    <a href="/consultas"><i class="fas fa-stethoscope"></i> Consultas</a>

</div>

<div class="container">

    <h1 class="mb-4">🐾 Lista de Consultas</h1>

    <!-- SEARCH -->
    <form class="mb-3" method="get" th:action="@{/consultas}">
        <div class="input-group">

            <input type="text"
                   name="search"
                   class="form-control"
                   placeholder="Buscar por mascota..."
                   th:value="${search}">

            <button class="btn btn-primary" type="submit">
                Buscar
            </button>

            <a th:href="@{/consultas}" class="btn">
                Reset
            </a>

        </div>
    </form>


    <!-- TABLE -->
    <div class="table-responsive">
        <table class="table table-bordered table-hover">

            <thead>
            <tr>
                <th>Mascota</th>
                <th>Diagnóstico</th>
                <th>Tratamientos</th>
                <th>Acciones</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="c : ${consultas}">

                <td th:text="${c['mascota_nombre']}"></td>
                <td th:text="${c['diagnostico']}"></td>

                <td>
                    <ul>
                        <li th:each="t : ${c['tratamientos']}"
                            th:text="${t['tratamiento']}"></li>
                    </ul>
                </td>

                <td>
                    <a th:href="@{'/consultas/editar/' + ${c['id']}}"
                       class="btn btn-warning btn-sm">
                        Editar
                    </a>

                    <a th:href="@{'/consultas/eliminar/' + ${c['id']}}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('¿Eliminar?');">
                        Eliminar
                    </a>

                    <a th:href="@{'/consultas/' + ${c['id']}}"
                       class="btn btn-info btn-sm">
                        Ver
                    </a>
                </td>

            </tr>

            </tbody>

        </table>
    </div>

</div>

</body>
</html>
