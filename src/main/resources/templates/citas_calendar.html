<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Calendario de Citas - VidaPet</title>

    <!-- CSS ها -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/3.10.2/fullcalendar.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        #calendar { max-width: 900px; margin: 0 auto; height: 700px; }
    </style>
</head>
<body class="p-4">

<h1>Calendario de Citas</h1>

<div id="calendar"></div>

<!-- Modal para reserva -->
<div class="modal fade" id="reservaModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form id="reservaForm">
                <div class="modal-header">
                    <h5 class="modal-title">Nueva Cita</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="fechaSeleccionada">

                    <div class="mb-3">
                        <label>Selecciona la Mascota</label>
                        <select id="mascota_id" name="mascota_id" class="form-control" required>
                            <option value="">Seleccione...</option>
                            <option th:each="m : ${mascotas}" th:value="${m.id}" th:text="${m.nombre} + ' (' + m.propietario_nombre + ')'"></option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label>Hora</label>
                        <select id="hora" name="hora" class="form-control" required></select>
                    </div>

                    <div class="mb-3">
                        <label>Notas</label>
                        <textarea id="notas" name="notas" class="form-control"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary">Reservar</button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- JS ها -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/3.10.2/fullcalendar.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    $(document).ready(function() {
        // Inicializa FullCalendar
        $('#calendar').fullCalendar({
            locale: 'es',
            defaultView: 'month',
            events: '/citas/calendar-data',
            dayClick: function(date) {
                $('#fechaSeleccionada').val(date.format('YYYY-MM-DD'));

                // Obtener horas libres via Ajax
                $.get('/horas-libres', { fecha: date.format('YYYY-MM-DD') }, function(data) {
                    $('#hora').empty();
                    data.forEach(function(h) {
                        $('#hora').append('<option value="'+h+'">'+h+'</option>');
                    });
                    var modal = new bootstrap.Modal(document.getElementById('reservaModal'));
                    modal.show();
                });
            }
        });

        // Guardar reserva via Ajax
        $('#reservaForm').submit(function(e){
            e.preventDefault();
            $.post('/reserve', {
                mascota_id: $('#mascota_id').val(),
                fecha: $('#fechaSeleccionada').val(),
                hora: $('#hora').val(),
                notas: $('#notas').val()
            }, function(){
                $('#reservaModal').modal('hide');
                $('#calendar').fullCalendar('refetchEvents');
                alert('Cita reservada correctamente.');
            });
        });
    });
</script>

</body>
</html>
