<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${detalle != null && detalle['id'] != '' ? 'Editar Detalle' : 'Nuevo Detalle'}">
        Detalle Tratamiento
    </title>
</head>
<body>

<h2 th:text="${detalle != null && detalle['id'] != '' ? 'Editar Detalle' : 'Nuevo Detalle'}"></h2>

<form th:action="${detalle != null && detalle['id'] != '' ? '/detalles/actualizar' : '/detalles/guardar'}"
      method="post">

    <!-- اگر ویرایش است، id را مخفی ارسال کن -->
    <input type="hidden" name="id" th:value="${detalle != null ? detalle['id'] : ''}">

    <!-- انتخاب مشاوره -->
    <label>Consulta:</label>
    <select name="consulta_id" required>
        <option value="">--Seleccione una consulta--</option>
        <option th:each="c : ${consultas}"
                th:value="${c['id']}"
                th:text="${c['id']} + ' - ' + ${c['fecha']}"
                th:selected="${detalle != null && detalle['consulta_id'] == c['id']}">
        </option>
    </select><br><br>

    <!-- انتخاب درمان -->
    <label>Tratamiento:</label>
    <select name="tratamiento_id" required>
        <option value="">--Seleccione un tratamiento--</option>
        <option th:each="t : ${tratamientos}"
                th:value="${t['id']}"
                th:text="${t['tipo']}"
                th:selected="${detalle != null && detalle['tratamiento_id'] == t['id']}">
        </option>
    </select><br><br>

    <button type="submit"
            th:text="${detalle != null && detalle['id'] != '' ? 'Actualizar' : 'Guardar'}">
        Guardar
    </button>
</form>

<br>
<a th:href="@{/detalles}">Volver a la lista</a>

</body>
</html>
