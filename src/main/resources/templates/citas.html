<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Citas - VidaPet</title>
    <link rel="stylesheet" href="/css/cita.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="layout">

    <!-- ===== Sidebar ===== -->
    <div class="sidebar">
        <h1>| VidaPET</h1>

        <a href="/"><i class="fas fa-home"></i> Home</a>
        <a href="/propietarios"><i class="fas fa-user"></i> Propietarios</a>
        <a href="/mascotas"><i class="fas fa-dog"></i> Mascotas</a>
        <a href="/veterinarios"><i class="fas fa-user-md"></i> Veterinarios</a>
        <a href="/especies"><i class="fas fa-paw"></i> Especies</a>
        <a href="/citas"><i class="fas fa-calendar"></i> Citas</a>
        <a href="/consultas"><i class="fas fa-stethoscope"></i> Consultas</a>

        <img src="/images/www.png" class="logo" alt="VidaPet">
    </div>

    <!-- ===== Main ===== -->
    <div class="main">

        <h1>📅 Gestión de Citas</h1>

        <!-- toolbar -->
        <div class="top-bar">
            <a class="btn" href="/citas/nueva">
                <i class="fas fa-plus"></i> Nueva Cita
            </a>

            <form class="search-container" method="get" action="/citas">
                <input type="text" name="mascota" placeholder="🐶 Mascota...">
                <input type="text" name="propietario" placeholder="👤 Propietario...">
                <input type="date" name="fecha">
                <button type="submit">
                    <i class="fas fa-search"></i>
                </button>
            </form>
        </div>

        <!-- table -->
        <table>
            <thead>
            <tr>
                <th>Mascota</th>
                <th>Propietario</th>
                <th>Veterinario</th>
                <th>Fecha</th>
                <th>Nota</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="c : ${citas}">

                <td data-label="Mascota" th:text="${c.mascota_nombre}" style="font-weight:600;"></td>

                <td data-label="Propietario"
                    th:text="${c.propietario_nombre + ' ' + c.propietario_apellido}"></td>

                <td data-label="Veterinario">
        <span th:if="${c.veterinario_nombre != null}">
            <i class="fas fa-user-md"></i>
            <span th:text="${c.veterinario_nombre + ' ' + c.veterinario_apellido}"></span>
        </span>
                    <span th:unless="${c.veterinario_nombre != null}" class="muted">
            Sin asignar
        </span>
                </td>

                <td data-label="Fecha"
                    th:text="${#temporals.format(c.fecha, 'dd/MM/yyyy HH:mm')}"></td>

                <td data-label="Nota" th:text="${c.nota}"></td>

                <td data-label="Estado">
        <span th:switch="${c.estado}">
            <span th:case="'ESPERANDO'" class="status waiting">🟡 Esperando</span>
            <span th:case="'ATENDIENDO'" class="status working">🔵 Atendiendo</span>
            <span th:case="'ATENDIDO'" class="status done">🟢 Atendido</span>
            <span th:case="*" class="status default">⚪ Sin estado</span>
        </span>
                </td>

                <td data-label="Acciones" class="actions">
                    <a th:if="${c.consulta_id == null}"
                       th:href="@{'/consultas/nueva-desde-cita/' + ${c.id}}"
                       class="icon-btn edit"><i class="fas fa-play"></i></a>

                    <a th:if="${c.consulta_id != null}"
                       th:href="@{'/consultas/' + ${c.consulta_id}}"
                       class="icon-btn edit"><i class="fas fa-eye"></i></a>

                    <a th:href="@{'/citas/editar/' + ${c.id}}"
                       class="icon-btn edit"><i class="fas fa-pen"></i></a>

                    <a th:href="@{'/citas/eliminar/' + ${c.id}}"
                       class="icon-btn delete"
                       onclick="return confirm('¿Eliminar cita?');">
                        <i class="fas fa-trash"></i>
                    </a>
                </td>

            </tr>
            </tbody>
        </table>

    </div>
</div>

</body>
</html>
