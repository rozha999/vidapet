<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Citas - VidaPet</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>
<body class="p-4">
<h1>Lista de Citas</h1>
<a th:href="@{/citas/nuevo}" class="btn btn-primary mb-3">Nueva Cita</a>
<table class="table table-bordered">
    <thead>
    <tr>
        <th>ID</th>
        <th>Mascota</th>
        <th>Propietario</th>
        <th>Fecha</th>
        <th>Hora</th>
        <th>Notas</th>
        <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="cita : ${citas}">
        <td th:text="${cita.id}"></td>
        <td th:text="${cita.mascota_nombre}"></td>
        <td th:text="${cita.mascota_propietario}"></td>
        <td th:text="${cita.fecha}"></td>
        <td th:text="${cita.hora}"></td>
        <td th:text="${cita.notas}"></td>
        <td>
            <a th:href="@{/citas/editar/{id}(id=${cita.id})}" class="btn btn-sm btn-warning">Editar</a>
            <a th:href="@{/citas/eliminar/{id}(id=${cita.id})}" class="btn btn-sm btn-danger"
               onclick="return confirm('¿Seguro que desea eliminar?');">Eliminar</a>
        </td>
    </tr>
    </tbody>
</table>
<a th:href="@{/citas/calendar}" class="btn btn-success mt-3">Ver Calendario</a>
</body>
</html>
