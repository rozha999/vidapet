<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" th:href="@{/css/fpropietario.css}">
  <title th:text="${propietario['id']} != '' ? 'Editar Propietario' : 'Nuevo Propietario'">Formulario</title>
</head>
<body>

<!-- ===== کارت فرم ===== -->
<div class="card-form">

  <!-- عنوان فرم -->
  <h1 th:text="${propietario['id']} != '' ? 'Editar Propietario' : 'Nuevo Propietario'">Formulario</h1>

  <!-- فرم برای ایجاد مالک جدید -->
  <form th:if="${propietario['id']} == ''"
        th:action="@{/propietarios/guardar}"
        method="post">

    <input type="hidden" name="id" th:value="${propietario['id']}" />

    <label>Nombre:</label>
    <input type="text" name="nombre" th:value="${propietario['nombre']}" required/>

    <label>Apellido:</label>
    <input type="text" name="apellido" th:value="${propietario['apellido']}" required/>

    <label>Teléfono:</label>
    <input type="text" name="telefono" th:value="${propietario['telefono']}" required/>

    <label>Email:</label>
    <input type="email" name="email" th:value="${propietario['email']}" required/>

    <button type="submit">Guardar</button>
  </form>

  <!-- فرم برای ویرایش مالک موجود -->
  <form th:if="${propietario['id']} != ''"
        th:action="@{/propietarios/actualizar}"
        method="post">

    <input type="hidden" name="id" th:value="${propietario['id']}"/>

    <label>Nombre:</label>
    <input type="text" name="nombre" th:value="${propietario['nombre']}" required/>

    <label>Apellido:</label>
    <input type="text" name="apellido" th:value="${propietario['apellido']}" required/>

    <label>Teléfono:</label>
    <input type="text" name="telefono" th:value="${propietario['telefono']}" required/>

    <label>Email:</label>
    <input type="email" name="email" th:value="${propietario['email']}" required/>

    <button type="submit">Actualizar</button>
  </form>

  <!-- لینک بازگشت به لیست -->
  <a href="/propietarios">Volver a la lista</a>
</div>

</body>
</html>
