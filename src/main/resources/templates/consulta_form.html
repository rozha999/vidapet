<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registrar/Editar Consulta - VidaPet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

<div class="container">

    <h1 class="mb-4" th:text="${consulta['id']} != null ? 'Editar Consulta' : 'Nueva Consulta'">Consulta</h1>

    <form th:action="@{${consulta['id']} != null ? '/consulta/actualizar' : '/consulta/guardar'}" method="post">
        <input type="hidden" name="id" th:value="${consulta['id']}" />

        <!-- Mascota -->
        <div class="mb-3">
            <label class="form-label">Mascota:</label>
            <select name="mascota_id" class="form-select" required>
                <option value="">Seleccione una mascota</option>
                <option th:each="m : ${mascotas}" th:value="${m.id}" th:text="${m.nombre}"
                        th:selected="${m.id} == ${consulta['mascota_id']}"></option>
            </select>
        </div>

        <!-- Diagnóstico -->
        <div class="mb-3">
            <label class="form-label">Diagnóstico:</label>
            <textarea name="diagnostico" class="form-control" required th:text="${consulta['diagnostico']}"></textarea>
        </div>

        <!-- Tratamientos -->
        <h4>Tratamientos</h4>
        <div id="tratamientos-container">
            <div th:each="t, iterStat : ${tratamientos}">
                <div class="border p-3 mb-2">
                    <h5>Tratamiento <span th:text="${iterStat.index + 1}"></span></h5>
                    <input type="hidden" th:name="tratamientos[__${iterStat.index}__][id]" th:value="${t['id']}"/>
                    <div class="mb-2">
                        <input name="tratamientos[__${iterStat.index}__][tratamiento]" class="form-control"
                               placeholder="Tratamiento" th:value="${t['tratamiento']}" required/>
                    </div>
                    <div class="mb-2">
                        <label>Fecha Inicio:</label>
                        <input type="date" name="tratamientos[__${iterStat.index}__][fecha_inicio]" class="form-control"
                               th:value="${t['fecha_inicio']}"/>
                    </div>
                    <div class="mb-2">
                        <label>Fecha Fin:</label>
                        <input type="date" name="tratamientos[__${iterStat.index}__][fecha_fin]" class="form-control"
                               th:value="${t['fecha_fin']}"/>
                    </div>
                    <div class="mb-2">
                        <input name="tratamientos[__${iterStat.index}__][observaciones]" class="form-control"
                               placeholder="Observaciones" th:value="${t['observaciones']}"/>
                    </div>
                </div>
            </div>
        </div>

        <button type="button" class="btn btn-secondary mb-3" onclick="agregarTratamiento()">Agregar Tratamiento</button>
        <button type="submit" class="btn btn-success">Guardar Consulta</button>
        <a href="/consulta" class="btn btn-secondary">Cancelar</a>
    </form>

    <script>
        function agregarTratamiento() {
            const container = document.getElementById('tratamientos-container');
            const index = container.children.length;
            const html = `
        <div class="border p-3 mb-2">
            <h5>Tratamiento ${index + 1}</h5>
            <div class="mb-2">
                <input name="tratamientos[${index}][tratamiento]" placeholder="Tratamiento" class="form-control" required/>
            </div>
            <div class="mb-2">
                <label>Fecha Inicio:</label>
                <input type="date" name="tratamientos[${index}][fecha_inicio]" class="form-control"/>
            </div>
            <div class="mb-2">
                <label>Fecha Fin:</label>
                <input type="date" name="tratamientos[${index}][fecha_fin]" class="form-control"/>
            </div>
            <div class="mb-2">
                <input name="tratamientos[${index}][observaciones]" placeholder="Observaciones" class="form-control"/>
            </div>
        </div>`;
            container.insertAdjacentHTML('beforeend', html);
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</div>
</body>
</html>
