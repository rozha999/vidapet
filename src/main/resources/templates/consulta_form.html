<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Consulta - VidaPet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">

<div class="container">


    <!-- ================= HEADER ================= -->
    <div class="card mb-4 shadow-sm">
        <div class="row g-0 align-items-center p-3">

            <!-- FOTO -->
            <div class="col-md-3 text-center">

                <img th:if="${data['foto'] != null and data['foto'] != ''}"
                     th:src="@{'/' + ${data['foto']}}"
                     style="width:150px;height:150px;object-fit:cover;border-radius:10px;">

                <img th:if="${data['foto'] == null or data['foto'] == ''}"
                     src="https://via.placeholder.com/150"
                     style="width:150px;height:150px;object-fit:cover;border-radius:10px;">
            </div>

            <!-- INFO -->
            <div class="col-md-9">

                <h3 th:text="${data['mascota_nombre']}"></h3>

                <p><b>Especie:</b> <span th:text="${data['especie']}"></span></p>
                <p><b>Raza:</b> <span th:text="${data['raza']}"></span></p>

                <p>
                    <b>Fecha de nacimiento:</b>
                    <span th:text="${#temporals.format(data['fecha_nacimiento'], 'dd/MM/yyyy')}"></span>
                </p>

                <p>
                    <b>Propietario:</b>
                    <span th:text="${data['propietario_nombre']} + ' ' + ${data['propietario_apellido']}"></span>
                </p>

                <p>
                    <b>Teléfono:</b>
                    <span th:text="${data['propietario_telefono']}"></span>
                </p>

                <p>
                    <b>Email:</b>
                    <span th:text="${data['propietario_email']}"></span>
                </p>

            </div>

        </div>
    </div>

    <!-- ================= FORM ================= -->
    <form th:action="${consulta['id'] != null} ? @{/consulta/actualizar} : @{/consultas/guardar-desde-cita}"
          method="post">

        <!-- IMPORTANT -->
        <input type="hidden" name="id" th:value="${consulta['id']}">
        <input type="hidden" name="mascota_id" th:value="${consulta['mascota_id']}">
        <input type="hidden" name="cita_id" th:value="${consulta['cita_id']}">

        <!-- DIAGNOSTICO -->
        <div class="mb-3">
            <label class="form-label">Diagnóstico:</label>
            <textarea name="diagnostico"
                      class="form-control"
                      required
                      th:text="${consulta['diagnostico']}"></textarea>
        </div>

        <!-- TRATAMIENTOS -->
        <h4>💊 Tratamientos</h4>

        <div id="tratamientos-container">

            <div th:each="t, iterStat : ${tratamientos}" class="border p-3 mb-2">

                <input type="hidden"
                       th:name="'tratamientos[' + ${iterStat.index} + '][id]'"
                       th:value="${t['id']}">

                <input class="form-control mb-2"
                       th:name="'tratamientos[' + ${iterStat.index} + '][tratamiento]'"
                       th:value="${t['tratamiento']}">

                <input type="date"
                       class="form-control mb-2"
                       th:name="'tratamientos[' + ${iterStat.index} + '][fecha_inicio]'"
                       th:value="${t['fecha_inicio']}">

                <input type="date"
                       class="form-control mb-2"
                       th:name="'tratamientos[' + ${iterStat.index} + '][fecha_fin]'"
                       th:value="${t['fecha_fin']}">

                <input class="form-control"
                       th:name="'tratamientos[' + ${iterStat.index} + '][observaciones]'"
                       th:value="${t['observaciones']}">

            </div>

        </div>

        <button type="button" class="btn btn-secondary mb-3" onclick="agregarTratamiento()">
            ➕ Agregar Tratamiento
        </button>

        <button type="submit" class="btn btn-success">
            💾 Guardar Consulta
        </button>

        <a href="/consulta" class="btn btn-secondary">Cancelar</a>

    </form>

</div>

<script>
    function agregarTratamiento() {
        const container = document.getElementById('tratamientos-container');
        const index = container.children.length;

        const html = `
    <div class="border p-3 mb-2">

        <input class="form-control mb-2"
               name="tratamientos[${index}][tratamiento]"
               placeholder="Tratamiento">

        <input type="date"
               class="form-control mb-2"
               name="tratamientos[${index}][fecha_inicio]">

        <input type="date"
               class="form-control mb-2"
               name="tratamientos[${index}][fecha_fin]">

        <input class="form-control"
               name="tratamientos[${index}][observaciones]"
               placeholder="Observaciones">

    </div>`;

        container.insertAdjacentHTML('beforeend', html);
    }
</script>

</body>
</html>
