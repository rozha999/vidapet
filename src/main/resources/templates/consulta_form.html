<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Consulta - VidaPet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">

<div class="container">

    <!-- ================= HEADER ================= -->
    <h2 class="mb-4">
        <span th:text="${consulta['id']} != null ? 'Editar Consulta' : 'Nueva Consulta desde Cita'"></span>
    </h2>

    <!-- ================= INFO MASCOTA ================= -->
    <div class="card mb-4 p-3 bg-light">

        <h4>🐶 Información de la Mascota</h4>

        <p><b>Nombre:</b> <span th:text="${consulta['mascota_nombre']}"></span></p>
        <p><b>Propietario:</b> <span th:text="${consulta['propietario_nombre']} + ' ' + ${consulta['propietario_apellido']}"></span></p>

        <p><b>ID Mascota:</b> <span th:text="${consulta['mascota_id']}"></span></p>

        <!-- hidden fields (IMPORTANT) -->
        <input type="hidden" name="mascota_id" th:value="${consulta['mascota_id']}" />
        <input type="hidden" name="cita_id" th:value="${consulta['cita_id']}" />

    </div>

    <!-- ================= FORM ================= -->
    <form th:action="@{${consulta['id']} != null ? '/consulta/actualizar' : '/consulta/guardar'}"
          method="post">

        <input type="hidden" name="id" th:value="${consulta['id']}" />

        <!-- ================= DIAGNOSTICO ================= -->
        <div class="mb-3">
            <label class="form-label">Diagnóstico:</label>
            <textarea name="diagnostico"
                      class="form-control"
                      required
                      th:text="${consulta['diagnostico']}">
            </textarea>
        </div>

        <!-- ================= TRATAMIENTOS ================= -->
        <h4>💊 Tratamientos</h4>

        <div id="tratamientos-container">

            <div th:each="t, iterStat : ${tratamientos}" class="border p-3 mb-2">

                <input type="hidden"
                       th:name="'tratamientos[' + ${iterStat.index} + '][id]'"
                       th:value="${t['id']}" />

                <input class="form-control mb-2"
                       th:name="'tratamientos[' + ${iterStat.index} + '][tratamiento]'"
                       th:value="${t['tratamiento']}"
                       placeholder="Tratamiento"
                       required />

                <input type="date"
                       class="form-control mb-2"
                       th:name="'tratamientos[' + ${iterStat.index} + '][fecha_inicio]'"
                       th:value="${t['fecha_inicio']}" />

                <input type="date"
                       class="form-control mb-2"
                       th:name="'tratamientos[' + ${iterStat.index} + '][fecha_fin]'"
                       th:value="${t['fecha_fin']}" />

                <input class="form-control"
                       th:name="'tratamientos[' + ${iterStat.index} + '][observaciones]'"
                       th:value="${t['observaciones']}"
                       placeholder="Observaciones" />

            </div>

        </div>

        <button type="button"
                class="btn btn-secondary mb-3"
                onclick="agregarTratamiento()">
            ➕ Agregar Tratamiento
        </button>

        <br/>

        <button type="submit" class="btn btn-success">
            💾 Guardar Consulta
        </button>

        <a href="/consulta" class="btn btn-secondary">
            Cancelar
        </a>

    </form>

</div>

<!-- ================= JS ================= -->
<script>
    function agregarTratamiento() {
        const container = document.getElementById('tratamientos-container');
        const index = container.children.length;

        const html = `
    <div class="border p-3 mb-2">

        <input class="form-control mb-2"
               name="tratamientos[${index}][tratamiento]"
               placeholder="Tratamiento"
               required />

        <input type="date"
               class="form-control mb-2"
               name="tratamientos[${index}][fecha_inicio]" />

        <input type="date"
               class="form-control mb-2"
               name="tratamientos[${index}][fecha_fin]" />

        <input class="form-control"
               name="tratamientos[${index}][observaciones]"
               placeholder="Observaciones" />

    </div>`;

        container.insertAdjacentHTML('beforeend', html);
    }
</script>

</body>
</html>
