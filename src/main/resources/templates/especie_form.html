<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Formulario de Especie</title>
  <link rel="stylesheet" href="/css/propietario.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    .form-card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
    .form-group input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px; }
    .preview-img { margin-top: 10px; border-radius: 10px; border: 2px solid #eee; }
  </style>
</head>
<body>
<div class="layout">
  <div class="main">
    <div class="form-card">
      <h2 th:text="${especie['id'] == '' ? 'Nueva Especie' : 'Editar Especie'}"></h2>
      <hr>

      <form th:action="${especie['id'] == '' ? '/especies/guardar' : '/especies/actualizar'}"
            method="post"
            enctype="multipart/form-data">

        <input type="hidden" name="id" th:value="${especie['id']}" />

        <div class="form-group">
          <label>Nombre de la Especie:</label>
          <input type="text" name="nombre" th:value="${especie['nombre']}" required placeholder="Ej: Canino, Felino...">
        </div>

        <div class="form-group">
          <label>Seleccionar Foto:</label>
          <input type="file" name="archivoFoto" accept="image/*">

          <div th:if="${especie['foto'] != null and especie['foto'] != ''}" class="mt-2">
            <p style="font-size: 0.8em; color: #666;">Foto actual:</p>
            <img th:src="@{'/' + ${especie['foto']}}" width="120" class="preview-img">
          </div>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 20px;">
          <button type="submit" class="btn" style="background-color: #28a745; color: white; border: none; cursor: pointer;">
            <i class="fas fa-save"></i> Guardar
          </button>
          <a href="/especies" class="btn" style="background-color: #6c757d; text-decoration: none; text-align: center;">
            Cancelar
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
</body>
</html>
