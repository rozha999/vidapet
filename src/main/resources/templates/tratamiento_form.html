<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${tratamiento['id'] == '' ? 'Nuevo Tratamiento - VidaPet' : 'Editar Tratamiento - VidaPet'}">VidaPET</title>

    <link rel="stylesheet" th:href="@{/css/propietario.css}">
    <link rel="stylesheet" th:href="@{/css/fpropietario.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="layout">

    <aside class="sidebar">
        <header>
            <h1>| VidaPET</h1>
        </header>
        <nav aria-label="Navegación principal">
            <a th:href="@{/}"><i class="fas fa-home"></i> <span>Home</span></a>
            <a th:href="@{/propietarios}"><i class="fas fa-user"></i> <span>Propietarios</span></a>
            <a th:href="@{/mascotas}"><i class="fas fa-dog"></i> <span>Mascotas</span></a>
            <a th:href="@{/veterinarios}"><i class="fas fa-user-md"></i> <span>Veterinarios</span></a>
            <a th:href="@{/especies}"><i class="fas fa-paw"></i> <span>Especies</span></a>
            <a th:href="@{/citas}"><i class="fas fa-calendar"></i> <span>Citas</span></a>
            <a th:href="@{/consultas}"><i class="fas fa-stethoscope"></i> <span>Consultas</span></a>
            <a th:href="@{/tratamientos}" class="active"><i class="fas fa-pills"></i> <span>Tratamientos</span></a>
        </nav>
        <figure class="logo-container">
            <img th:src="@{/images/www.png}" class="logo" alt="VidaPet Logo">
        </figure>
    </aside>

    <main class="main">
        <header>
            <h1 th:text="${tratamiento['id'] == '' ? 'Nuevo Tratamiento' : 'Editar Tratamiento'}">Formulario Tratamiento</h1>
        </header>

        <section class="card-form">
            <form th:action="${tratamiento['id'] == '' ? @{/tratamientos/guardar} : @{/tratamientos/actualizar}}" method="post">

                <input type="hidden" th:if="${tratamiento['id'] != ''}" name="id" th:value="${tratamiento['id']}">

                <div class="form-group">
                    <label for="consulta_id"><i class="fas fa-file-medical"></i> Consulta Relacionada:</label>
                    <select name="consulta_id" id="consulta_id" required>
                        <option value="">Seleccione una consulta</option>
                        <option th:each="c : ${consultas}"
                                th:value="${c.id}"
                                th:text="${'Consulta #' + c.id + ' - Mascota: ' + c.mascota_nombre}"
                                th:selected="${tratamiento['consulta_id']} == ${c.id}">
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="tratamiento"><i class="fas fa-briefcase-medical"></i> Tratamiento:</label>
                    <input type="text" id="tratamiento" name="tratamiento"
                           th:value="${tratamiento['tratamiento']}" required
                           placeholder="Ej: Antibiótico cada 8h">
                </div>

                <div class="form-group">
                    <label for="fecha_inicio"><i class="fas fa-calendar-plus"></i> Fecha Inicio:</label>
                    <input type="date" id="fecha_inicio" name="fecha_inicio"
                           th:value="${tratamiento['fecha_inicio']}">
                </div>

                <div class="form-group">
                    <label for="fecha_fin"><i class="fas fa-calendar-check"></i> Fecha Fin:</label>
                    <input type="date" id="fecha_fin" name="fecha_fin"
                           th:value="${tratamiento['fecha_fin']}">
                </div>

                <div class="form-group">
                    <label for="observaciones"><i class="fas fa-notes-medical"></i> Observaciones:</label>
                    <textarea id="observaciones" name="observaciones"
                              th:text="${tratamiento['observaciones']}"
                              placeholder="Detalles adicionales del tratamiento..."></textarea>
                </div>

                <footer class="form-actions">
                    <button type="submit" class="btn">
                        <i class="fas fa-save"></i>
                        <span th:text="${tratamiento['id'] == '' ? ' Guardar' : ' Actualizar'}"></span>
                    </button>
                    <a th:href="@{/tratamientos}" class="btn-secondary">
                        <i class="fas fa-arrow-left"></i> Volver a la lista
                    </a>
                </footer>
            </form>
        </section>
    </main>
</div>

</body>
</html>
