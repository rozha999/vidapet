<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Tratamiento</title>
</head>
<body>

<h2 th:text="${tratamiento['id']} == '' ? 'Nuevo Tratamiento' : 'Editar Tratamiento'"></h2>

<form th:action="${tratamiento['id']} == '' ? @{/tratamientos/guardar} : @{/tratamientos/actualizar}" method="post">
    <!-- Campo oculto para enviar ID si es edición -->
    <input type="hidden" th:if="${tratamiento['id']} != ''" name="id" th:value="${tratamiento['id']}">

    <!-- Selección de Consulta -->
    <div>
        <label>Consulta:</label>
        <select name="consulta_id" required>
            <option value="">Seleccione una consulta</option>
            <option th:each="c : ${consultas}"
                    th:value="${c.id}"
                    th:text="${'Consulta #' + c.id + ' - Mascota: ' + c.mascota_nombre}"
                    th:selected="${tratamiento['consulta_id']} == ${c.id}">
            </option>
        </select>
    </div>

    <!-- Tratamiento -->
    <div>
        <label>Tratamiento:</label>
        <input type="text" name="tratamiento" th:value="${tratamiento['tratamiento']}" required>
    </div>

    <!-- Fecha Inicio -->
    <div>
        <label>Fecha Inicio:</label>
        <input type="date" name="fecha_inicio" th:value="${tratamiento['fecha_inicio']}">
    </div>

    <!-- Fecha Fin -->
    <div>
        <label>Fecha Fin:</label>
        <input type="date" name="fecha_fin" th:value="${tratamiento['fecha_fin']}">
    </div>

    <!-- Observaciones -->
    <div>
        <label>Observaciones:</label>
        <textarea name="observaciones" th:text="${tratamiento['observaciones']}"></textarea>
    </div>

    <button type="submit" th:text="${tratamiento['id']} == '' ? 'Guardar' : 'Actualizar'"></button>
</form>

<br>
<a href="/tratamientos">Volver a la lista de tratamientos</a>

</body>
</html>
