<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>VidaPet - Panel de Administración</title>
    <style>
        body { font-family: Arial, sans-serif; }
        h1 { color: #2c3e50; }
        ul { list-style-type: none; padding: 0; }
        li { margin: 10px 0; }
        a.button {
            display: inline-block;
            padding: 10px 20px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        a.button:hover { background-color: #2980b9; }
    </style>
</head>
<body>

<h1>Bienvenido a VidaPet - Panel de Administración</h1>
<p>Seleccione una opción para gestionar:</p>

<ul>
    <li><a class="button" th:href="@{/propietarios}">Propietarios</a></li>
    <li><a class="button" th:href="@{/mascotas}">Mascotas</a></li>
    <li><a class="button" th:href="@{/citas}">Citas</a></li> <!-- ← اینجا calendar نمایش داده می‌شود -->
    <li><a class="button" th:href="@{/tratamientos}">Tratamientos</a></li>
    <li><a class="button" th:href="@{/historial}">Historial Médico</a></li>
</ul>

</body>
</html>
