<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tratamientos - VidaPet</title>

    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link rel="stylesheet" th:href="@{/css/mascota.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="layout">

    <aside class="sidebar">
        <header>
            <h1>| VidaPET</h1>
        </header>
        <nav aria-label="Menú principal">
            <a th:href="@{/}"><i class="fas fa-home"></i> <span>Home</span></a>
            <a th:href="@{/propietarios}"><i class="fas fa-user"></i> <span>Propietarios</span></a>
            <a th:href="@{/mascotas}"><i class="fas fa-dog"></i> <span>Mascotas</span></a>
            <a th:href="@{/veterinarios}"><i class="fas fa-user-md"></i> <span>Veterinarios</span></a>
            <a th:href="@{/especies}"><i class="fas fa-paw"></i> <span>Especies</span></a>
            <a th:href="@{/citas}"><i class="fas fa-calendar"></i> <span>Citas</span></a>
            <a th:href="@{/consultas}"><i class="fas fa-stethoscope"></i> <span>Consultas</span></a>
            <a th:href="@{/tratamientos}" class="active"><i class="fas fa-pills"></i> <span>Tratamientos</span></a>
        </nav>
        <figure class="logo-container">
            <img th:src="@{/images/www.png}" class="logo" alt="VidaPet Logo">
        </figure>
    </aside>

    <main class="main">

        <header class="d-flex justify-content-between align-items-center mb-4">
            <h1><i class="fas fa-pills"></i> Lista de Tratamientos</h1>
            <a th:href="@{/tratamientos/nuevo}" class="btn">
                <i class="fas fa-plus"></i> Agregar Tratamiento
            </a>
        </header>

        <section class="top-bar">
            <div class="search-container">
                <input type="text" placeholder="Buscar tratamiento...">
                <button type="button"><i class="fas fa-search"></i></button>
            </div>
        </section>

        <section class="table-container">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Consulta</th>
                    <th>Tratamiento</th>
                    <th>Periodo</th>
                    <th>Observaciones</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="t : ${tratamientos}">
                    <td><span class="badge-id" th:text="'#' + ${t['id']}"></span></td>
                    <td>
                        <div class="consulta-info">
                            <i class="fas fa-file-medical text-primary"></i>
                            <span th:text="'Consulta #' + ${t['consulta_id']}"></span>
                        </div>
                    </td>
                    <td>
                        <strong class="pet-name" th:text="${t['tratamiento']}"></strong>
                    </td>
                    <td>
                        <div class="date-range">
                            <small class="d-block text-success">
                                <i class="fas fa-play-circle"></i> <span th:text="${t['fecha_inicio']}"></span>
                            </small>
                            <small class="d-block text-danger">
                                <i class="fas fa-stop-circle"></i> <span th:text="${t['fecha_fin']}"></span>
                            </small>
                        </div>
                    </td>
                    <td>
                        <p class="muted" th:text="${t['observaciones']}"></p>
                    </td>
                    <td class="actions">
                        <nav aria-label="Acciones de registro">
                            <a th:href="@{'/tratamientos/editar/' + ${t['id']}}" class="icon-btn edit" title="Editar">
                                <i class="fas fa-edit"></i>
                            </a>
                            <a th:href="@{'/tratamientos/eliminar/' + ${t['id']}}"
                               class="icon-btn delete"
                               title="Eliminar"
                               onclick="return confirm('¿Está seguro de eliminar este tratamiento?');">
                                <i class="fas fa-trash"></i>
                            </a>
                        </nav>
                    </td>
                </tr>
                </tbody>
            </table>

            <div th:if="${#lists.isEmpty(tratamientos)}" class="empty">
                <i class="fas fa-folder-open fa-3x"></i>
                <p>No hay tratamientos registrados todavía.</p>
            </div>
        </section>

        <footer class="mt-4">
            <a href="/" class="btn-secondary">
                <i class="fas fa-arrow-left"></i> Volver al inicio
            </a>
        </footer>

    </main>
</div>

</body>
</html>
