<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tratamientos - VidaPet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

<div class="container">

    <h1 class="mb-4">Lista de Tratamientos</h1>

    <a th:href="@{/tratamientos/nuevo}" class="btn btn-primary mb-3">Agregar Tratamiento</a>

    <table class="table table-bordered table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>Consulta</th>
            <th>Tratamiento</th>
            <th>Fecha Inicio</th>
            <th>Fecha Fin</th>
            <th>Observaciones</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="t : ${tratamientos}">
            <td th:text="${t['id']}"></td>
            <td th:text="${t['consulta_id']}"></td>
            <td th:text="${t['tratamiento']}"></td>
            <td th:text="${t['fecha_inicio']}"></td>
            <td th:text="${t['fecha_fin']}"></td>
            <td th:text="${t['observaciones']}"></td>
            <td>
                <a th:href="@{'/tratamientos/editar/' + ${t['id']}}" class="btn btn-warning btn-sm">Editar</a>
                <a th:href="@{'/tratamientos/eliminar/' + ${t['id']}}" class="btn btn-danger btn-sm"
                   onclick="return confirm('¿Está seguro de eliminar este tratamiento?');">Eliminar</a>
            </td>
        </tr>
        </tbody>
    </table>

    <a href="/" class="btn btn-secondary mt-3">Volver al inicio</a>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</div>
</body>
</html>
