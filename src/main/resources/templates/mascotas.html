<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/css/mascota.css">
    <title>Mascotas</title>

    <!-- Font Awesome (para los íconos) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!-- ===== Sidebar ===== -->
<div class="sidebar">
    <h2>🐾 VidaPet</h2>

    <a href="/">
        <i class="fas fa-home"></i> Home
    </a>

    <a href="/propietarios">
        <i class="fas fa-user"></i> Propietarios
    </a>

    <a href="/mascotas">
        <i class="fas fa-dog"></i> Mascotas
    </a>

    <a href="/citas">
        <i class="fas fa-calendar"></i> Citas
    </a>

    <a href="/consultas">
        <i class="fas fa-stethoscope"></i> Consultas
    </a>
</div>

<!-- ===== Main Content ===== -->
<div class="main">

    <h1>Mascotas</h1>

    <!-- Botón para agregar nueva mascota -->
    <a th:href="@{/mascotas/nuevo}">
        <button>Agregar</button>
    </a>

    <!-- Tabla de mascotas -->
    <table border="1">
        <thead>
        <tr>
            <th>Nombre</th>
            <th>Especie</th>
            <th>Raza</th>
            <th>Fecha Nacimiento</th>
            <th>Propietario</th>
            <th>Acciones</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="m : ${mascotas}">
            <td th:text="${m['nombre']}"></td>
            <td th:text="${m['especie']}"></td>
            <td th:text="${m['raza']}"></td>
            <td th:text="${m['fecha_nacimiento']}"></td>
            <td th:text="${m['propietario_nombre']} + ' ' + ${m['propietario_apellido']}"></td>

            <td>
                <a th:href="@{'/mascotas/editar/' + ${m['id']}}">
                    <button>Editar</button>
                </a>
                |
                <a th:href="@{'/mascotas/eliminar/' + ${m['id']}}"
                   onclick="return confirm('¿Está seguro de eliminar esta mascota?');">
                    <button>Eliminar</button>
                </a>
            </td>
        </tr>
        </tbody>
    </table>

    <br/>
    <a href="/">Volver al inicio</a>

</div>

</body>
</html>
