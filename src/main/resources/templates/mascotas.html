<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/mascota.css">
    <title>Mascotas | VidaPET</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="layout">

    <aside class="sidebar">
        <header>
            <a href="/" class="navbar-brand">
                <h1>| VidaPET</h1>
            </a>
        </header>

        <nav aria-label="Navegación Principal">
            <ul>
                <li><a href="/"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="/propietarios"><i class="fas fa-user"></i> Propietarios</a></li>
                <li><a href="/mascotas" class="active"><i class="fas fa-dog"></i> Mascotas</a></li>
                <li><a href="/veterinarios"><i class="fas fa-user-md"></i> Veterinarios</a></li>
                <li><a href="/especies"><i class="fas fa-paw"></i> Especies</a></li>
                <li><a href="/citas"><i class="fas fa-calendar"></i> Citas</a></li>
                <li><a href="/consultas"><i class="fas fa-stethoscope"></i> Consultas</a></li>
            </ul>
        </nav>

        <figure class="logo-container">
            <img src="/images/www.png" class="logo" alt="Logotipo de VidaPet">
        </figure>
    </aside>

    <main class="main">

        <header class="main-header">
            <h1>Mascotas</h1>
        </header>
        <section class="top-bar">
            <div class="actions-wrapper">
                <a th:href="@{/mascotas/nuevo}" class="btn">
                    <i class="fas fa-plus"></i> Agregar
                </a>
            </div>

            <search class="search-container">
                <form method="get" action="/mascotas">
                    <input type="search" name="search"
                           placeholder="Buscar por nombre..."
                           aria-label="Buscar mascota"
                           th:value="${param.search}"> <button type="submit" aria-label="Ejecutar búsqueda">
                    <i class="fas fa-search"></i>
                </button>
                </form>
            </search>
        </section>

        <section class="table-container">
            <table>
                <thead>
                <tr>
                    <th scope="col">Foto</th>
                    <th scope="col">Nombre</th>
                    <th scope="col">Especie</th>
                    <th scope="col">Raza</th>
                    <th scope="col">Fecha Nacimiento</th>
                    <th scope="col">Propietario</th>
                    <th scope="col">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="m : ${mascotas}">
                    <td class="td-photo">
                        <figure th:if="${m['foto'] != null and m['foto'] != ''}">
                            <img th:src="@{'/' + ${m['foto']}}"
                                 alt="Foto de mascota"
                                 width="80" height="80"
                                 style="border-radius: 12px; object-fit: cover; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                        </figure>
                        <span th:unless="${m['foto'] != null and m['foto'] != ''}" class="no-photo">Sin foto</span>
                    </td>
                    <td th:text="${m['nombre']}" style="font-weight: 600;"></td>
                    <td th:text="${m['especie_nombre']}"></td>
                    <td th:text="${m['raza']}"></td>
                    <td th:text="${m['fecha_nacimiento']}"></td>
                    <td th:text="${m['propietario_nombre']} + ' ' + ${m['propietario_apellido']}"></td>
                    <td class="actions">
                        <a th:href="@{'/mascotas/editar/' + ${m['id']}}"
                           class="icon-btn edit" title="Editar">
                            <i class="fas fa-pen"></i>
                        </a>
                        <a th:href="@{'/mascotas/eliminar/' + ${m['id']}}"
                           class="icon-btn delete"
                           onclick="return confirm('¿Eliminar mascota?');"
                           title="Eliminar">
                            <i class="fas fa-trash"></i>
                        </a>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(mascotas)}">
                    <td colspan="7" class="empty-message">
                        No hay mascotas registradas
                    </td>
                </tr>
                </tbody>
            </table>
        </section>
    </main>
</div>
</body>
</html>
