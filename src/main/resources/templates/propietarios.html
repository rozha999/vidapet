<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Propietarios</title>
</head>
<body>

<!-- ===== Título de la página ===== -->
<h1>Lista de Propietarios</h1>

<!-- ===== Botón para agregar un nuevo propietario ===== -->
<a href="/propietarios/nuevo">
    <button>Agregar Nuevo Propietario</button>
</a>

<!-- ===== Tabla con todos los propietarios ===== -->
<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Apellido</th>
        <th>Teléfono</th>
        <th>Email</th>
        <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <!-- Iterar sobre la lista de propietarios enviada desde el controlador -->
    <tr th:each="propietario : ${propietarios}">
        <td th:text="${propietario['id']}"></td>
        <td th:text="${propietario['nombre']}"></td>
        <td th:text="${propietario['apellido']}"></td>
        <td th:text="${propietario['telefono']}"></td>
        <td th:text="${propietario['email']}"></td>
        <td>
            <!-- Botón para editar propietario -->
            <a th:href="@{'/propietarios/editar/' + ${propietario['id']}}">
                <button>Editar</button>
            </a>
            |
            <!-- Botón para eliminar propietario con confirmación -->
            <a th:href="@{'/propietarios/eliminar/' + ${propietario['id']}}"
               onclick="return confirm('¿Está seguro de eliminar este propietario?');">
                <button>Eliminar</button>
            </a>
        </td>
    </tr>
    </tbody>
</table>

<br>

<!-- ===== Enlace para volver a la página principal ===== -->
<a href="/">
    <button>Volver al inicio</button>
</a>

</body>
</html>
