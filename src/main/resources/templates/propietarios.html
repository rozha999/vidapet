<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/propietario.css">
    <title>Lista de Propietarios</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

</head>
<body>

<h1>Lista de Propietarios</h1>

<!-- ===== Botón para agregar un nuevo propietario ===== -->
<a th:href="@{/propietarios/nuevo}" class="btn">
    <i class="fas fa-plus"></i> Agregar
</a>

<table border="1">
    <thead>
    <tr>
        <th>Nombre</th>
        <th>Apellido</th>
        <th>Teléfono</th>
        <th>Email</th>
        <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="propietario : ${propietarios}">
        <td th:text="${propietario['nombre']}"></td>
        <td th:text="${propietario['apellido']}"></td>
        <td th:text="${propietario['telefono']}"></td>
        <td th:text="${propietario['email']}"></td>
        <td>
            <a th:href="@{'/propietarios/editar/' + ${propietario['id']}}" class="btn" title="Editar">
                <i class="fas fa-edit"></i> Editar
            </a>
            <a th:href="@{'/propietarios/eliminar/' + ${propietario['id']}}"
               onclick="return confirm('¿Está seguro de eliminar este propietario?');"
               class="btn" title="Eliminar">
                <i class="fas fa-trash-alt"></i> Eliminar
            </a>
        </td>
    </tr>
    </tbody>
</table>

<br>

<!-- ===== Enlace para volver a la página principal ===== -->
<a th:href="@{/}" class="btn">
    <i class="fas fa-arrow-left"></i> Volver
</a>

</body>
</html>
