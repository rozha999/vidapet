<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/propietario.css">
    <title>Lista de Propietarios | VidaPET</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="layout">

    <aside class="sidebar">
        <header>
            <h1>| VidaPET</h1>
        </header>

        <nav aria-label="Navegación Principal">
            <ul>
                <li><a href="/"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="/propietarios" class="active"><i class="fas fa-user"></i> Propietarios</a></li>
                <li><a href="/mascotas"><i class="fas fa-dog"></i> Mascotas</a></li>
                <li><a href="/veterinarios"><i class="fas fa-user-md"></i> Veterinarios</a></li>
                <li><a href="/especies"><i class="fas fa-paw"></i> Especies</a></li>
                <li><a href="/citas"><i class="fas fa-calendar"></i> Citas</a></li>
                <li><a href="/consultas"><i class="fas fa-stethoscope"></i> Consultas</a></li>
            </ul>
        </nav>

        <figure class="logo-container">
            <img src="/images/www.png" class="logo" alt="Logotipo de VidaPet">
        </figure>
    </aside>

    <main class="main">

        <header class="main-header">
            <h1>Lista de Propietarios</h1>
        </header>

        <section class="top-bar" aria-label="Acciones y búsqueda">
            <div class="actions-wrapper">
                <a th:href="@{/propietarios/nuevo}" class="btn">
                    <i class="fas fa-plus"></i> Agregar
                </a>
            </div>

            <search class="search-container">
                <form method="get" action="/propietarios">
                    <input type="search" name="search" placeholder="Buscar por nombre o apellido..." aria-label="Buscar propietario">
                    <button type="submit" aria-label="Ejecutar búsqueda">
                        <i class="fas fa-search"></i>
                    </button>
                </form>
            </search>
        </section>

        <section class="table-container">
            <table>
                <thead>
                <tr>
                    <th scope="col">Nombre</th>
                    <th scope="col">Apellido</th>
                    <th scope="col">Teléfono</th>
                    <th scope="col">Email</th>
                    <th scope="col">Acciones</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="propietario : ${propietarios}">
                    <td th:text="${propietario['nombre']}"></td>
                    <td th:text="${propietario['apellido']}"></td>
                    <td th:text="${propietario['telefono']}"></td>
                    <td th:text="${propietario['email']}"></td>

                    <td class="actions">
                        <a th:href="@{'/propietarios/editar/' + ${propietario['id']}}"
                           class="icon-btn edit" title="Editar Propietario">
                            <i class="fas fa-pen"></i>
                        </a>

                        <a th:href="@{'/propietarios/eliminar/' + ${propietario['id']}}"
                           class="icon-btn delete"
                           onclick="return confirm('¿Eliminar propietario?');"
                           title="Eliminar Propietario">
                            <i class="fas fa-trash"></i>
                        </a>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(propietarios)}">
                    <td colspan="5" class="empty-message">
                        No hay propietarios registrados
                    </td>
                </tr>
                </tbody>
            </table>
        </section>

    </main>
</div>

</body>
</html>
