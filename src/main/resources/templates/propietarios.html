<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/propietario.css">
    <title>Lista de Propietarios</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

</head>
<body>

<div class="layout">

    <div class="sidebar">
        <h2>🐾 VidaPet</h2>
        <a href="/">
            <i class="fas fa-home"></i> Home
        </a>

        <a href="/propietarios">
            <i class="fas fa-user"></i> Propietarios
        </a>

        <a href="/especies">
            <i class="fas fa-paw"></i> Especies
        </a>

        <a href="/mascotas">
            <i class="fas fa-dog"></i> Mascotas
        </a>

        <a href="/citas">
            <i class="fas fa-calendar"></i> Citas
        </a>

        <a href="/consultas">
            <i class="fas fa-stethoscope"></i> Consultas
        </a>
    </div>

    <!-- ===== Main Content ===== -->
    <div class="main">

        <h1>Lista de Propietarios</h1>

        <a th:href="@{/propietarios/nuevo}" class="btn">
            <i class="fas fa-plus"></i> Agregar
        </a>

        <div class="search-container">
            <form method="get" action="/propietarios">
                <input type="text" name="search" placeholder="Buscar por nombre o apellido..." />
                <button type="submit">
                    <i class="fas fa-search"></i> Buscar
                </button>
            </form>
        </div>

        <table border="1">
            <thead>
            <tr>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Teléfono</th>
                <th>Email</th>
                <th>Acciones</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="propietario : ${propietarios}">
                <td th:text="${propietario['nombre']}"></td>
                <td th:text="${propietario['apellido']}"></td>
                <td th:text="${propietario['telefono']}"></td>
                <td th:text="${propietario['email']}"></td>
                <td>
                    <a th:href="@{'/propietarios/editar/' + ${propietario['id']}}" class="btn">
                        <i class="fas fa-edit"></i>
                    </a>

                    <a th:href="@{'/propietarios/eliminar/' + ${propietario['id']}}"
                       onclick="return confirm('¿Está seguro?');"
                       class="btn">
                        <i class="fas fa-trash-alt"></i>
                    </a>
                </td>
            </tr>
            </tbody>
        </table>

    </div>
</div>

</body>
</html>
